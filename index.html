<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#0f0f1a"/>
  <meta name="description" content="TKJ1 Gallery - Koleksi foto dan video TKJ OnE"/>
  <title>TKJ1 Gallery</title>
  
  <!-- ⚠️ IKLAN SCRIPT (Jangan diubah) -->
  <script src="https://quge5.com/88/tag.min.js" data-zone="213278" async data-cfasync="false"></script>
  
  <!-- 🔐 Cloudflare Turnstile Script -->
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  
  <!-- 🎨 Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #0a0a0f;
      --card: #151520;
      --card-hover: #1a1a28;
      --text: #ffffff;
      --text-muted: #888899;
      --accent: #00d4aa;
      --accent-hover: #00b894;
      --border: #2a2a3a;
      --error: #ff4757;
      --success: #2ed573;
    }

    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
      -webkit-tap-highlight-color: transparent; 
    }
    
    html { scroll-behavior: smooth; }
    
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
      overflow-x: hidden;    }

    body.modal-open { overflow: hidden; }

    /* === UTILITIES === */
    .hidden { 
      display: none !important; 
      visibility: hidden !important;
      opacity: 0 !important;
      pointer-events: none !important;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* === HEADER === */
    .header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 20px 0;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(10px);
    }

    .header-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), #00a8ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      white-space: nowrap;
    }

    .search-box {
      flex: 1;
      min-width: 200px;
      max-width: 400px;      position: relative;
    }

    .search-box input {
      width: 100%;
      padding: 12px 20px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      transition: all 0.3s;
    }

    .search-box input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0, 212, 170, 0.1);
    }

    .search-box input::placeholder { color: var(--text-muted); }

    .filter-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 10px 18px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .filter-btn:hover, .filter-btn.active {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
    }

    /* === MAIN CONTENT === */
    .main {
      padding: 30px 0;      min-height: calc(100vh - 200px);
    }

    /* === GALLERY GRID === */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .gallery-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
    }

    .gallery-item:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: 0 10px 40px rgba(0, 212, 170, 0.15);
    }

    .gallery-thumb {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      background: var(--bg);
      pointer-events: none;
      user-select: none;
    }

    .gallery-info {
      padding: 16px;
    }

    .gallery-title {
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .gallery-meta {
      display: flex;      gap: 12px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .badge {
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .badge-photo {
      background: rgba(0, 212, 170, 0.15);
      color: var(--accent);
    }

    .badge-video {
      background: rgba(0, 168, 255, 0.15);
      color: #00a8ff;
    }

    /* === DIRECT PHOTO VIEW (FULL PAGE) === */
    .photo-view {
      min-height: calc(100vh - 80px);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .photo-view-container {
      width: 100%;
      max-width: 1000px;
      background: var(--card);
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .photo-view-media {
      width: 100%;
      max-height: 70vh;
      object-fit: contain;
      background: var(--bg);
      display: block;
      pointer-events: none;
      user-select: none;
    }
    .photo-view-info {
      padding: 24px;
    }

    .photo-view-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .photo-view-desc {
      color: var(--text-muted);
      margin-bottom: 20px;
      line-height: 1.7;
    }

    .photo-view-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    /* === BUTTONS === */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.9rem;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      text-decoration: none;
      white-space: nowrap;
    }

    .btn:hover { transform: translateY(-2px); }
    .btn:active { transform: translateY(0); }

    .btn-primary {
      background: var(--accent);
      color: var(--bg);
    }

    .btn-primary:hover {
      background: var(--accent-hover);      box-shadow: 0 5px 20px rgba(0, 212, 170, 0.3);
    }

    .btn-secondary {
      background: var(--card-hover);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: var(--border);
    }

    .btn-outline {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-outline:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* === MODAL (POPUP) === */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
      backdrop-filter: blur(10px);
    }

    .modal.hidden { 
      display: none !important; 
    }

    .modal-content {
      background: var(--card);
      border-radius: 20px;
      max-width: 800px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      border: 1px solid var(--border);
      position: relative;    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 1.5rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      z-index: 10;
    }

    .modal-close:hover {
      background: var(--error);
      border-color: var(--error);
      transform: rotate(90deg);
    }

    .modal-media {
      width: 100%;
      max-height: 60vh;
      object-fit: contain;
      background: var(--bg);
      display: block;
      pointer-events: none;
    }

    .modal-body {
      padding: 24px;
    }

    .modal-title {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .modal-desc {
      color: var(--text-muted);
      margin-bottom: 20px;
    }
    .modal-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    /* === TURNSTILE MODAL === */
    .turnstile-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 20px;
    }

    .turnstile-box {
      background: var(--card);
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      max-width: 450px;
      width: 100%;
      border: 1px solid var(--border);
    }

    .turnstile-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .turnstile-desc {
      color: var(--text-muted);
      margin-bottom: 30px;
    }

    .turnstile-widget {
      display: flex;
      justify-content: center;
      margin: 20px 0;
      min-height: 65px;
    }

    /* === LOADING & ERROR === */
    .loading, .error {
      text-align: center;      padding: 60px 20px;
    }

    .loading-icon {
      font-size: 3rem;
      margin-bottom: 16px;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .error {
      color: var(--error);
    }

    .error-icon {
      font-size: 3rem;
      margin-bottom: 16px;
    }

    /* === EMPTY STATE === */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      grid-column: 1 / -1;
    }

    .empty-icon {
      font-size: 4rem;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    /* === TOAST === */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--card);
      color: var(--text);
      padding: 14px 28px;
      border-radius: 12px;
      border: 1px solid var(--border);
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      transition: transform 0.3s;      z-index: 9999;
      font-weight: 500;
      max-width: 90vw;
      text-align: center;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    /* === RESPONSIVE === */
    @media (max-width: 768px) {
      .header-content {
        flex-direction: column;
        align-items: stretch;
      }

      .search-box {
        max-width: none;
        order: 2;
      }

      .filter-group {
        order: 1;
        justify-content: center;
      }

      .gallery-grid {
        grid-template-columns: 1fr;
      }

      .photo-view-actions,
      .modal-actions {
        flex-direction: column;
      }

      .btn {
        width: 100%;
        justify-content: center;
      }

      .turnstile-box {
        padding: 30px 20px;
      }
    }

    /* === SCROLLBAR === */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;    }

    ::-webkit-scrollbar-track {
      background: var(--bg);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--accent);
    }
  </style>
</head>
<body>

  <!-- ⚠️ PROTEKSI KONTEN -->
  <script>
    (function blockDownloads() {
      ['contextmenu','selectstart','dragstart','copy','cut'].forEach(evt => 
        document.addEventListener(evt, e => { e.preventDefault(); return false; }, { passive: false })
      );
    })();
  </script>

  <!-- 🔐 TURNSTILE VERIFICATION -->
  <div id="turnstile-modal" class="turnstile-modal">
    <div class="turnstile-box">
      <div class="turnstile-title">🔐 Verifikasi Dulu Bre</div>
      <p class="turnstile-desc">Biar aman dari bot bangsat, verifikasi dulu yak</p>
      <div class="turnstile-widget">
        <div class="cf-turnstile"
             data-sitekey="0x4AAAAAACsh1EKuTtF6HdMQ"
             data-callback="onVerifySuccess"
             data-error-callback="onVerifyError"
             data-theme="dark"
             data-size="normal">
        </div>
      </div>
      <div id="turnstile-error" style="color:var(--error);font-size:0.9rem;margin-top:10px;min-height:20px;"></div>
    </div>
  </div>

  <!-- ️ PHOTO POPUP MODAL (untuk browsing dari homepage) -->
  <div id="photo-modal" class="modal hidden">
    <div class="modal-content">
      <button class="modal-close" id="modal-close" aria-label="Tutup">×</button>
      <img class="modal-media" id="modal-img" src="" alt="Photo" />      <video class="modal-media" id="modal-video" src="" controls playsinline></video>
      <div class="modal-body">
        <h2 class="modal-title" id="modal-title"></h2>
        <p class="modal-desc" id="modal-desc"></p>
        <p style="color:var(--text-muted);font-size:0.9rem;margin-bottom:20px;" id="modal-meta"></p>
        <div class="modal-actions">
          <button id="btn-app-modal" class="btn btn-primary">📱 Buka di App</button>
          <button id="btn-share-modal" class="btn btn-secondary">🔗 Bagikan</button>
          <button id="btn-back-gallery" class="btn btn-outline">← Kembali ke Gallery</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 📱 MAIN APP -->
  <header class="header">
    <div class="container">
      <div class="header-content">
        <div class="logo">📸 TKJ1 Gallery</div>
        
        <div class="search-box">
          <input type="text" id="search-input" placeholder="🔍 Cari foto..." autocomplete="off">
        </div>
        
        <div class="filter-group">
          <button class="filter-btn active" data-filter="all">Semua</button>
          <button class="filter-btn" data-filter="photo">Foto</button>
          <button class="filter-btn" data-filter="video">Video</button>
        </div>
      </div>
    </div>
  </header>

  <main class="main">
    <div class="container">
      <!-- Loading State -->
      <div id="loading" class="loading">
        <div class="loading-icon">⏳</div>
        <div>Loading bre, sabar dikit...</div>
      </div>

      <!-- Error State -->
      <div id="error" class="error hidden">
        <div class="error-icon">❌</div>
        <div id="error-msg"></div>
      </div>

      <!-- Direct Photo View (Full Page) -->
      <div id="photo-view" class="photo-view hidden">
        <div class="photo-view-container">          <img class="photo-view-media" id="view-img" src="" alt="Photo" />
          <video class="photo-view-media" id="view-video" src="" controls playsinline></video>
          <div class="photo-view-info">
            <h1 class="photo-view-title" id="view-title"></h1>
            <p class="photo-view-desc" id="view-desc"></p>
            <p style="color:var(--text-muted);margin-bottom:20px;" id="view-meta"></p>
            <div class="photo-view-actions">
              <button id="btn-app-view" class="btn btn-primary">📱 Buka & Download di App</button>
              <button id="btn-share-view" class="btn btn-secondary">🔗 Bagikan</button>
              <button id="btn-back-home" class="btn btn-outline">← Kembali ke Home</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Gallery Grid -->
      <div id="gallery-section" class="hidden">
        <div id="gallery-grid" class="gallery-grid"></div>
        <div id="empty-state" class="empty-state hidden">
          <div class="empty-icon">🔍</div>
          <div>Gak ada foto yang cocok, bre!</div>
        </div>
      </div>
    </div>
  </main>

  <div id="toast" class="toast"></div>

  <script>
    (function() {
      'use strict';
      
      const CONFIG = {
        APP_PACKAGES: ['com.tkjone.app', 'com.tkjone.app.debug'],
        APP_SCHEME: 'tkjone',
        DEEP_LINK_PATH: 'photo',
        FALLBACK_URL: 'https://github.com/Jirankun/TKJ-One/releases',
        BASE_URL: 'https://tkj1.pages.dev'
      };

      let allPhotos = [], filteredPhotos = [];
      let isVerified = false;
      let currentPhoto = null;

      // DOM Elements
      const els = {
        turnstileModal: document.getElementById('turnstile-modal'),
        turnstileError: document.getElementById('turnstile-error'),
        
        photoModal: document.getElementById('photo-modal'),        modalClose: document.getElementById('modal-close'),
        modalImg: document.getElementById('modal-img'),
        modalVideo: document.getElementById('modal-video'),
        modalTitle: document.getElementById('modal-title'),
        modalDesc: document.getElementById('modal-desc'),
        modalMeta: document.getElementById('modal-meta'),
        btnAppModal: document.getElementById('btn-app-modal'),
        btnShareModal: document.getElementById('btn-share-modal'),
        btnBackGallery: document.getElementById('btn-back-gallery'),
        
        loading: document.getElementById('loading'),
        error: document.getElementById('error'),
        errorMsg: document.getElementById('error-msg'),
        
        photoView: document.getElementById('photo-view'),
        viewImg: document.getElementById('view-img'),
        viewVideo: document.getElementById('view-video'),
        viewTitle: document.getElementById('view-title'),
        viewDesc: document.getElementById('view-desc'),
        viewMeta: document.getElementById('view-meta'),
        btnAppView: document.getElementById('btn-app-view'),
        btnShareView: document.getElementById('btn-share-view'),
        btnBackHome: document.getElementById('btn-back-home'),
        
        gallerySection: document.getElementById('gallery-section'),
        galleryGrid: document.getElementById('gallery-grid'),
        emptyState: document.getElementById('empty-state'),
        
        searchInput: document.getElementById('search-input'),
        filterBtns: document.querySelectorAll('.filter-btn'),
        toast: document.getElementById('toast')
      };

      // === UTILS ===
      function showToast(msg, duration = 3000) {
        els.toast.textContent = msg;
        els.toast.classList.add('show');
        setTimeout(() => els.toast.classList.remove('show'), duration);
      }

      function isVideo(url) {
        if (!url) return false;
        const lower = url.toLowerCase();
        return lower.includes('.mp4') || lower.includes('.webm') || lower.includes('video');
      }

      function protectMedia(el) {
        if (!el) return;
        ['contextmenu','dragstart','selectstart'].forEach(evt => 
          el.addEventListener(evt, e => { e.preventDefault(); return false; }, { passive: false })        );
        if (el.tagName === 'IMG') {
          el.style.pointerEvents = 'none';
          el.style.userSelect = 'none';
        }
      }

      // === TURNSTILE ===
      window.onVerifySuccess = function(token) {
        console.log('✓ Verified:', token);
        els.turnstileError.textContent = '';
        isVerified = true;
        
        setTimeout(() => {
          els.turnstileModal.classList.add('hidden');
          document.body.classList.remove('modal-open');
          initGallery();
        }, 400);
      };

      window.onVerifyError = function() {
        console.error('✗ Verify error');
        els.turnstileError.textContent = 'Verifikasi gagal. Coba lagi bre.';
        setTimeout(() => { if (window.turnstile) turnstile.reset(); }, 3000);
      };

      // === SHOW PHOTO (Popup vs Full Page) ===
      function showPhoto(photo, usePopup = true) {
        currentPhoto = photo;
        const isVid = isVideo(photo.url);
        
        if (usePopup) {
          // Show as popup
          els.modalTitle.textContent = photo.title || `#${photo.name}`;
          els.modalImg.style.display = isVid ? 'none' : 'block';
          els.modalVideo.style.display = isVid ? 'block' : 'none';
          
          if (isVid) {
            els.modalVideo.src = photo.url;
            els.modalVideo.load();
            els.modalImg.src = '';
          } else {
            els.modalImg.src = photo.url;
            els.modalVideo.src = '';
            protectMedia(els.modalImg);
          }
          
          els.modalDesc.textContent = photo.desc || photo.description || 'No description';
          els.modalMeta.textContent = `👤 ${photo.gender || '-'} | 📅 ${photo.date || '-'}`;
                    els.photoModal.classList.remove('hidden');
          document.body.classList.add('modal-open');
          
          // Setup buttons
          els.btnAppModal.onclick = () => openApp(photo.name);
          els.btnShareModal.onclick = () => sharePhoto(photo);
          els.btnBackGallery.onclick = closeModal;
          els.modalClose.onclick = closeModal;
          els.photoModal.onclick = (e) => { if (e.target === els.photoModal) closeModal(); };
          
        } else {
          // Show as full page (direct link)
          showFullPhotoView(photo);
        }
      }

      function showFullPhotoView(photo) {
        const isVid = isVideo(photo.url);
        
        els.viewTitle.textContent = photo.title || `#${photo.name}`;
        els.viewImg.style.display = isVid ? 'none' : 'block';
        els.viewVideo.style.display = isVid ? 'block' : 'none';
        
        if (isVid) {
          els.viewVideo.src = photo.url;
          els.viewVideo.load();
          els.viewImg.src = '';
        } else {
          els.viewImg.src = photo.url;
          els.viewVideo.src = '';
          protectMedia(els.viewImg);
        }
        
        els.viewDesc.textContent = photo.desc || photo.description || 'No description';
        els.viewMeta.textContent = `👤 ${photo.gender || '-'} | 📅 ${photo.date || '-'}`;
        
        els.gallerySection.classList.add('hidden');
        els.photoView.classList.remove('hidden');
        document.body.classList.remove('modal-open');
        
        // Setup buttons
        els.btnAppView.onclick = () => openApp(photo.name);
        els.btnShareView.onclick = () => sharePhoto(photo);
        els.btnBackHome.onclick = () => {
          els.photoView.classList.add('hidden');
          els.gallerySection.classList.remove('hidden');
          window.history.pushState({}, '', '/');
        };
        
        window.scrollTo(0, 0);      }

      function closeModal() {
        els.photoModal.classList.add('hidden');
        document.body.classList.remove('modal-open');
        els.modalVideo.pause();
        els.modalVideo.src = '';
        els.modalImg.src = '';
      }

      // === DEEP LINK / APP OPEN ===
      function openApp(photoId) {
        const schemeUrl = `${CONFIG.APP_SCHEME}://${CONFIG.DEEP_LINK_PATH}/${photoId}`;
        const fallback = CONFIG.FALLBACK_URL;
        
        // Try custom scheme first
        let opened = false;
        const timeout = setTimeout(() => {
          if (!opened) {
            window.location.href = fallback;
          }
        }, 2500);
        
        try {
          window.location.href = schemeUrl;
          opened = true;
          clearTimeout(timeout);
        } catch (e) {
          window.location.href = fallback;
        }
        
        // For Android intent
        const intentUrl = `intent://${CONFIG.BASE_URL}/photo/${photoId}#Intent;scheme=${CONFIG.APP_SCHEME};package=${CONFIG.APP_PACKAGES[0]};S.browser_fallback_url=${encodeURIComponent(fallback)};end`;
        
        setTimeout(() => {
          if (document.hidden) {
            // App opened
          } else {
            // Try intent for Android
            window.location.href = intentUrl;
          }
        }, 100);
      }

      // === SHARE ===
      function sharePhoto(photo) {
        const shareText = `Check this out!\n📷 ${photo.title || '#' + photo.name}\n\nOpen in app:\n${CONFIG.APP_SCHEME}://photo/${photo.name}\n\nOr visit:\n${CONFIG.BASE_URL}/photo/${photo.name}`;
        
        if (navigator.share) {
          navigator.share({             title: 'TKJ1 Gallery', 
            text: shareText 
          }).then(() => showToast('✅ Berhasil dibagikan!')).catch(() => {});
        } else {
          navigator.clipboard.writeText(shareText)
            .then(() => showToast('🔗 Link copied!'))
            .catch(() => showToast('Gagal copy link'));
        }
      }

      // === RENDER GALLERY ===
      function renderGallery(photos) {
        els.galleryGrid.innerHTML = '';
        
        if (photos.length === 0) {
          els.emptyState.classList.remove('hidden');
          return;
        }
        
        els.emptyState.classList.add('hidden');
        
        photos.forEach(photo => {
          const isVid = isVideo(photo.url);
          const item = document.createElement('div');
          item.className = 'gallery-item';
          item.innerHTML = `
            ${isVid 
              ? `<video class="gallery-thumb" src="${photo.url}" muted preload="none"></video>`
              : `<img class="gallery-thumb" src="${photo.url}" alt="${photo.title||photo.name}" loading="lazy">`
            }
            <div class="gallery-info">
              <div class="gallery-title">${photo.title || '#' + photo.name}</div>
              <div class="gallery-meta">
                <span class="badge ${isVid ? 'badge-video' : 'badge-photo'}">${isVid ? '🎬 Video' : '📷 Foto'}</span>
                ${photo.gender ? `<span>👤 ${photo.gender}</span>` : ''}
              </div>
            </div>
          `;
          
          item.addEventListener('click', () => showPhoto(photo, true));
          
          // Protect media
          const mediaEl = item.querySelector('img, video');
          if (mediaEl) {
            ['contextmenu','dragstart','selectstart'].forEach(evt => 
              mediaEl.addEventListener(evt, e => { e.preventDefault(); return false; }, { passive: false })
            );
            mediaEl.style.pointerEvents = 'none';
          }
                    els.galleryGrid.appendChild(item);
        });
      }

      // === FILTER & SEARCH ===
      function applyFilters() {
        const query = els.searchInput.value.toLowerCase().trim();
        const activeFilter = document.querySelector('.filter-btn.active')?.dataset.filter || 'all';
        
        filteredPhotos = allPhotos.filter(p => {
          const matchSearch = !query || 
            String(p.name).toLowerCase().includes(query) || 
            (p.title && p.title.toLowerCase().includes(query));
          
          const matchType = activeFilter === 'all' || 
            (activeFilter === 'video' && isVideo(p.url)) || 
            (activeFilter === 'photo' && !isVideo(p.url));
          
          return matchSearch && matchType;
        });
        
        renderGallery(filteredPhotos);
      }

      // === INIT ===
      async function initGallery() {
        const path = window.location.pathname;
        const parts = path.split('/').filter(Boolean);
        const directPhotoName = (parts[0] === 'photo' && parts[1]) ? decodeURIComponent(parts[1]) : null;
        
        try {
          els.loading.classList.remove('hidden');
          
          const res = await fetch('/DB/photos.json?t=' + Date.now());
          if (!res.ok) throw new Error('Gagal load data (Status: ' + res.status + ')');
          
          const data = await res.json();
          allPhotos = Array.isArray(data) ? data : (data.photos || data.data || []);
          
          if (!Array.isArray(allPhotos)) throw new Error('Format JSON salah!');
          
          // Sort by name/number
          allPhotos.sort((a, b) => {
            const na = parseInt(a.name), nb = parseInt(b.name);
            if (!isNaN(na) && !isNaN(nb)) return na - nb;
            return String(a.name).localeCompare(String(b.name));
          });
          
          filteredPhotos = [...allPhotos];
                    // Search & filter events
          els.searchInput.addEventListener('input', applyFilters);
          els.filterBtns.forEach(btn => {
            btn.onclick = () => {
              els.filterBtns.forEach(b => b.classList.remove('active'));
              btn.classList.add('active');
              applyFilters();
            };
          });
          
          els.loading.classList.add('hidden');
          
          // Check if direct link
          if (directPhotoName) {
            const photo = allPhotos.find(p => String(p.name).toLowerCase() === String(directPhotoName).toLowerCase());
            if (photo) {
              showPhoto(photo, false); // false = full page view
            } else {
              els.errorMsg.textContent = `Foto "${directPhotoName}" gak ditemukan bre!`;
              els.error.classList.remove('hidden');
            }
          } else {
            els.gallerySection.classList.remove('hidden');
            renderGallery(filteredPhotos);
          }
          
        } catch (err) {
          console.error('[Error]', err);
          els.loading.classList.add('hidden');
          els.errorMsg.textContent = err.message || 'Gagal load gallery. Cek koneksi internet bre!';
          els.error.classList.remove('hidden');
        }
      }

      // Handle browser back/forward
      window.addEventListener('popstate', () => {
        const path = window.location.pathname;
        if (!path.includes('/photo/')) {
          els.photoView.classList.add('hidden');
          els.gallerySection.classList.remove('hidden');
        }
      });

    })();
  </script>
</body>
</html>

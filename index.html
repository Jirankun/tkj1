  <!-- Main App Script (deferred) -->
  <script defer>
    (function(){'use strict';
      function isSearchEngineBot(){const bots=['googlebot','bingbot','yandex','baiduspider','duckduckbot','slurp'];return bots.some(b=>navigator.userAgent.toLowerCase().includes(b));}
      function shouldSkipVerification(){return isSearchEngineBot()||location.pathname.includes('/photo/');}
      function isMobileDevice(){const ua=navigator.userAgent||navigator.vendor||window.opera;return/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(ua)||innerWidth<=768;}
      
      function initPCBlocker(){const b=document.getElementById('pc-blocker');if(!isMobileDevice()){b.classList.add('active');document.body.classList.add('pc-blocked');['main-header','main-content'].forEach(id=>document.getElementById(id)?.classList.add('hidden'));document.querySelector('.footer')?.classList.add('hidden');}}
      initPCBlocker();addEventListener('resize',()=>{const b=document.getElementById('pc-blocker');if(isMobileDevice()&&b.classList.contains('active')){b.classList.remove('active');document.body.classList.remove('pc-blocked');['main-header','main-content'].forEach(id=>document.getElementById(id)?.classList.remove('hidden'));document.querySelector('.footer')?.classList.remove('hidden');}});

      const CONFIG={APP_PACKAGES:['com.tkjone.app','com.tkjone.app.debug'],APP_SCHEME:'tkjone',DEEP_LINK_PATH:'photo',FALLBACK_URL:'https://github.com/Jirankun/TKJ-One/releases',BASE_URL:'https://tkj1.pages.dev'};
      let allPhotos=[],filteredPhotos=[],currentPhoto=null,videoObserver=null,playingThumbnailVideo=null,appOpenTimeout=null,appOpenVisibilityHandler=null;
      
      const els={photoModal:null,modalImg:null,modalVideo:null,modalTitle:null,modalDesc:null,modalMeta:null,btnAppModal:null,btnShareModal:null,appOpenModal:null,btnAppDownload:null,loading:document.getElementById('loading'),error:document.getElementById('error'),errorMsg:document.getElementById('error-msg'),photoView:document.getElementById('photo-view'),viewImg:document.getElementById('view-img'),viewVideo:document.getElementById('view-video'),viewTitle:document.getElementById('view-title'),viewDesc:document.getElementById('view-desc'),viewMeta:document.getElementById('view-meta'),btnAppView:document.getElementById('btn-app-view'),btnShareView:document.getElementById('btn-share-view'),gallerySection:document.getElementById('gallery-section'),galleryGrid:document.getElementById('gallery-grid'),emptyState:document.getElementById('empty-state'),searchInput:document.getElementById('search-input'),filterBtns:document.querySelectorAll('.filter-btn'),toast:document.getElementById('toast'),mainHeader:document.getElementById('main-header'),mainContent:document.getElementById('main-content')};
      
      // Lazy init modals from template
      function initModals(){const t=document.getElementById('modal-templates');if(t&&t.content){['photo-modal','app-open-modal','confirm-modal','turnstile-modal'].forEach(id=>{const el=t.content.querySelector('#'+id);if(el){document.body.appendChild(el.cloneNode(true));}});}
      // Cache refs after cloning
      Object.assign(els,{photoModal:document.getElementById('photo-modal'),modalImg:document.getElementById('modal-img'),modalVideo:document.getElementById('modal-video'),modalTitle:document.getElementById('modal-title'),modalDesc:document.getElementById('modal-desc'),modalMeta:document.getElementById('modal-meta'),btnAppModal:document.getElementById('btn-app-modal'),btnShareModal:document.getElementById('btn-share-modal'),appOpenModal:document.getElementById('app-open-modal'),btnAppDownload:document.getElementById('btn-app-download')});}

      window.unlockBodyScroll=()=>{document.body.classList.remove('modal-open','view-open','comments-fullscreen');document.body.style.overflow='';document.documentElement.style.overflow='';};
      function showToast(msg,dur=2500){els.toast.textContent=msg;els.toast.classList.add('show');setTimeout(()=>els.toast.classList.remove('show'),dur);}
      function isVideo(url){return url&&(url.toLowerCase().includes('.mp4')||url.toLowerCase().includes('.webm')||url.toLowerCase().includes('video'));}
      function protectMedia(el){if(!el)return;['contextmenu','dragstart','selectstart'].forEach(e=>el.addEventListener(e,ev=>{ev.preventDefault();return false;},{passive:false}));if(el.tagName==='IMG'){el.style.pointerEvents='none';el.style.userSelect='none';}if(el.tagName==='VIDEO')el.setAttribute('controlsList','nodownload');}
      addEventListener('scroll',()=>{els.mainHeader.style.boxShadow=scrollY>10?'0 4px 20px rgba(0,0,0,.3)':'none';},{passive:true});

      window.openConfirmModal=()=>{initModals();document.getElementById('confirm-modal').classList.remove('hidden');document.body.classList.add('modal-open');};
      window.cancelDiscussion=()=>{document.getElementById('confirm-modal').classList.add('hidden');window.unlockBodyScroll();showToast('✅ Oke bre, balik ke gallery');};
      window.startDiscussion=()=>{document.getElementById('confirm-modal').classList.add('hidden');document.getElementById('giscus-fullscreen').classList.add('active');document.body.classList.add('comments-fullscreen');showToast('💬 Login GitHub dulu bre!');};
      window.closeGiscusFullscreen=()=>{document.getElementById('giscus-fullscreen').classList.remove('active');window.unlockBodyScroll();};

      function initVideoObserver(){if(videoObserver)videoObserver.disconnect();videoObserver=new IntersectionObserver(entries=>{entries.forEach(entry=>{const v=entry.target;if(!els.photoModal?.classList.contains('hidden')||!els.photoView.classList.contains('hidden')||!els.appOpenModal?.classList.contains('hidden')||document.getElementById('giscus-fullscreen')?.classList.contains('active')){v.pause();return;}if(entry.isIntersecting){v.muted=true;v.playsInline=true;v.loop=true;v.play().catch(()=>{});}else{v.pause();v.currentTime=0;}});},{threshold:.5});}
      function observeVideo(el){if(videoObserver&&el)videoObserver.observe(el);}
      function pauseAllGalleryVideos(){document.querySelectorAll('.gallery-thumb.video-thumb').forEach(vid=>{if(!vid.paused)playingThumbnailVideo=vid;vid.pause();});}
      function resumeThumbnailVideo(){if(playingThumbnailVideo&&document.contains(playingThumbnailVideo)){const r=playingThumbnailVideo.getBoundingClientRect();if(r.top<innerHeight&&r.bottom>0)playingThumbnailVideo.play().catch(()=>{});playingThumbnailVideo=null;}}

      function showPhoto(photo,popup=true){currentPhoto=photo;const v=isVideo(photo.url);if(popup){initModals();pauseAllGalleryVideos();els.modalTitle.textContent=photo.title||`#${photo.name}`;els.modalImg.style.display=v?'none':'block';els.modalVideo.style.display=v?'block':'none';if(v){els.modalVideo.src=photo.url;els.modalVideo.load();els.modalImg.src='';}else{els.modalImg.src=photo.url;els.modalVideo.src='';protectMedia(els.modalImg);}els.modalDesc.textContent=photo.desc||photo.description||'No description';els.modalMeta.textContent=`👤 ${photo.gender||'-'} | 📅 ${photo.date||'-'}`;els.photoModal.classList.remove('hidden');document.body.classList.add('modal-open');els.btnAppModal.onclick=()=>openApp(photo.name);els.btnShareModal.onclick=()=>sharePhoto(photo);els.photoModal.onclick=e=>{if(e.target===els.photoModal)window.closePhotoModal();};}else showFullPhotoView(photo);}
      window.closePhotoModal=()=>{els.photoModal?.classList.add('hidden');els.modalVideo?.pause();els.modalVideo&&(els.modalVideo.src='');els.modalImg&&(els.modalImg.src='');resumeThumbnailVideo();window.unlockBodyScroll();};
      function showFullPhotoView(photo){els.mainHeader.classList.add('hidden');els.mainContent.classList.add('full-view');const v=isVideo(photo.url);els.viewTitle.textContent=photo.title||`#${photo.name}`;els.viewImg.style.display=v?'none':'block';els.viewVideo.style.display=v?'block':'none';if(v){els.viewVideo.src=photo.url;els.viewVideo.load();els.viewImg.src='';}else{els.viewImg.src=photo.url;els.viewVideo.src='';protectMedia(els.viewImg);}els.viewDesc.textContent=photo.desc||photo.description||'No description';els.viewMeta.textContent=`👤 ${photo.gender||'-'} | 📅 ${photo.date||'-'}`;els.gallerySection.classList.add('hidden');els.photoView.classList.remove('hidden');document.body.classList.add('view-open');els.btnAppView.onclick=()=>openApp(photo.name);els.btnShareView.onclick=()=>sharePhoto(photo);scrollTo(0,0);}
      function closeFullView(){els.photoView.classList.add('hidden');els.gallerySection.classList.remove('hidden');els.mainHeader.classList.remove('hidden');els.mainContent.classList.remove('full-view');els.viewVideo?.pause();els.viewVideo&&(els.viewVideo.src='');els.viewImg&&(els.viewImg.src='');history.pushState({},"",'/');window.unlockBodyScroll();}

      function openApp(id){try{const i=document.createElement('iframe');i.style.display='none';i.src=`${CONFIG.APP_SCHEME}://${CONFIG.DEEP_LINK_PATH}/${id}`;document.body.appendChild(i);setTimeout(()=>{if(document.body.contains(i))document.body.removeChild(i);},1e3);}catch(e){}setTimeout(()=>{try{location.href=`intent://${CONFIG.DEEP_LINK_PATH}/${id}#Intent;scheme=${CONFIG.APP_SCHEME};package=${CONFIG.APP_PACKAGES[0]};S.browser_fallback_url=${encodeURIComponent(CONFIG.FALLBACK_URL)};end`;}catch(e){}},100);appOpenTimeout=setTimeout(()=>{if(!document.hidden)showAppOpenModal();},1500);appOpenVisibilityHandler=()=>{if(document.hidden){clearTimeout(appOpenTimeout);window.hideAppOpenModal();removeEventListener('visibilitychange',appOpenVisibilityHandler);}};addEventListener('visibilitychange',appOpenVisibilityHandler);}
      function showAppOpenModal(){initModals();els.appOpenModal.classList.remove('hidden');document.body.classList.add('modal-open');els.btnAppDownload.onclick=()=>{window.hideAppOpenModal();location.href=CONFIG.FALLBACK_URL;};}
      window.hideAppOpenModal=()=>{els.appOpenModal?.classList.add('hidden');clearTimeout(appOpenTimeout);if(appOpenVisibilityHandler){removeEventListener('visibilitychange',appOpenVisibilityHandler);appOpenVisibilityHandler=null;}window.unlockBodyScroll();};

      function sharePhoto(photo){const t=`Check this out!\n📷 ${photo.title||'#'+photo.name}\n\nOpen in app:\n${CONFIG.APP_SCHEME}://photo/${photo.name}\n\nOr visit:\n${CONFIG.BASE_URL}/photo/${photo.name}`;if(navigator.share)navigator.share({title:'TKJ1 Gallery',text:t}).then(()=>showToast('✅ Berhasil dibagikan!')).catch(()=>{});else navigator.clipboard.writeText(t).then(()=>showToast('🔗 Link copied!')).catch(()=>showToast('Gagal copy link'));}

      function renderGallery(photos){els.galleryGrid.innerHTML='';if(!photos||photos.length===0){els.emptyState.classList.remove('hidden');return;}els.emptyState.classList.add('hidden');photos.forEach(photo=>{const v=isVideo(photo.url);const item=document.createElement('div');item.className='gallery-item';if(v){item.innerHTML=`<video class="gallery-thumb video-thumb" src="${photo.url}" muted preload="none" playsinline loop controlsList="nodownload" loading="lazy"></video><div class="gallery-info"><div class="gallery-title">${photo.title||'#'+photo.name}</div><div class="gallery-meta"><span class="badge badge-video">🎬 Video</span>${photo.gender?`<span>👤 ${photo.gender}</span>`:''}</div></div>`;const vid=item.querySelector('video');observeVideo(vid);protectMedia(vid);}else{item.innerHTML=`<img class="gallery-thumb" src="${photo.url}" alt="${photo.title||photo.name}" loading="lazy"><div class="gallery-info"><div class="gallery-title">${photo.title||'#'+photo.name}</div><div class="gallery-meta"><span class="badge badge-photo">📷 Foto</span>${photo.gender?`<span>👤 ${photo.gender}</span>`:''}</div></div>`;protectMedia(item.querySelector('img'));}item.addEventListener('click',()=>showPhoto(photo,true));els.galleryGrid.appendChild(item);});}

      window.setFilter=(btn,type)=>{document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');applyFilters();};
      function applyFilters(){const q=els.searchInput.value.toLowerCase().trim();const af=document.querySelector('.filter-btn.active')?.dataset.filter||'all';filteredPhotos=allPhotos.filter(p=>{const ms=!q||String(p.name).toLowerCase().includes(q)||(p.title&&p.title.toLowerCase().includes(q));const mt=af==='all'||(af==='video'&&isVideo(p.url))||(af==='photo'&&!isVideo(p.url));return ms&&mt;});renderGallery(filteredPhotos);}

      async function initGallery(){if(window.galleryInitialized||document.getElementById('pc-blocker').classList.contains('active'))return;window.galleryInitialized=true;const path=location.pathname;const parts=path.split('/').filter(Boolean);const direct=parts[0]==='photo'&&parts[1]?decodeURIComponent(parts[1]):null;try{els.loading.classList.remove('hidden');if(els.error)els.error.classList.add('hidden');let res;const paths=['/DB/photos.json','/photos.json','DB/photos.json','photos.json'];for(const p of paths){try{res=await fetch(p+'?t='+Date.now());if(res.ok)break;}catch(e){}}if(!res||!res.ok)throw new Error('Gagal load photos.json');const data=await res.json();allPhotos=Array.isArray(data)?data:(data.photos||data.data||[]);if(!Array.isArray(allPhotos))throw new Error('Format JSON salah!');allPhotos.sort((a,b)=>{const na=parseInt(a.name),nb=parseInt(b.name);return(!isNaN(na)&&!isNaN(nb))?na-nb:String(a.name).localeCompare(String(b.name));});filteredPhotos=[...allPhotos];els.searchInput.addEventListener('input',applyFilters);els.loading.classList.add('hidden');if(direct){const p=allPhotos.find(x=>String(x.name).toLowerCase()===direct.toLowerCase());if(p)showPhoto(p,false);else{els.errorMsg.textContent=`Foto "${direct}" gak ditemukan bre!`;els.error.classList.remove('hidden');}}else{initVideoObserver();els.gallerySection.classList.remove('hidden');renderGallery(filteredPhotos);}}catch(err){els.loading.classList.add('hidden');if(els.errorMsg)els.errorMsg.textContent=`Error: ${err.message}`;if(els.error)els.error.classList.remove('hidden');}}
      window.__initGallery=initGallery;

      addEventListener('popstate',()=>{const p=location.pathname;if(!p.includes('/photo/')&&!els.photoView.classList.contains('hidden'))closeFullView();if(document.getElementById('giscus-fullscreen')?.classList.contains('active'))window.closeGiscusFullscreen();});
      document.addEventListener('keydown',e=>{if(e.key==='Escape'){if(els.photoModal?.classList.contains('hidden')===false)window.closePhotoModal();if(els.appOpenModal?.classList.contains('hidden')===false)window.hideAppOpenModal();if(document.getElementById('confirm-modal')?.classList.contains('hidden')===false||document.getElementById('giscus-fullscreen')?.classList.contains('active'))window.closeGiscusFullscreen();}});

      window.onVerifySuccess=token=>{window.isTurnstileVerified=true;document.getElementById('turnstile-modal')?.classList.add('hidden');window.unlockBodyScroll();if(typeof window.__initGallery==='function')window.__initGallery();};
      window.onVerifyError=errCode=>{const el=document.getElementById('turnstile-error');if(el){el.textContent=`Verifikasi gagal (${errCode||'UNKNOWN'})`;el.style.color='var(--error)';}const fb=document.getElementById('turnstile-fallback');if(fb)fb.style.display='block';};

      if(shouldSkipVerification()){window.isTurnstileVerified=true;document.getElementById('turnstile-modal')?.classList.add('hidden');initGallery();}else{setTimeout(()=>{if(!window.turnstile&&!window.isTurnstileVerified){const fb=document.getElementById('turnstile-fallback');if(fb)fb.style.display='block';setTimeout(()=>{if(!window.isTurnstileVerified)window.onVerifySuccess('auto-bypass');},15e3);}},1e4);}

      function runInit(){els.filterBtns.forEach(btn=>btn.onclick=()=>{document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');applyFilters();});if(window.isTurnstileVerified&&!window.galleryInitialized)initGallery();}
      if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',runInit);else runInit();
    })();
  </script>

  </script>

<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#121212"/>
  <title>Gallery Photo - TKJ1</title>
  <style>
    /* === CSS INLINE - DARK THEME === */
    :root {
      --bg: #121212;
      --text: #ffffff;
      --accent: #00ff88;
      --error: #ff4444;
      --card-bg: #1e1e1e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      line-height: 1.6;
    }
    #app {
      max-width: 800px;
      width: 100%;
      text-align: center;
    }
    .hidden { display: none !important; }
    
    /* Loading & Error */
    #loading, #error {
      font-size: 1.1rem;
      padding: 25px;
      background: var(--card-bg);
      border-radius: 12px;
      margin: 20px 0;
    }
    #error {
      color: var(--error);
      border: 2px solid var(--error);
      animation: shake 0.5s ease-in-out;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
    
    /* Photo Container */
    #photo-container {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 25px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
      animation: fadeIn 0.4s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    #photo-title {
      font-size: 1.8rem;
      margin-bottom: 15px;
      color: var(--accent);
      text-shadow: 0 0 10px rgba(0,255,136,0.3);
    }
    
    #photo-img {
      max-width: 100%;
      height: auto;
      border-radius: 12px;
      margin: 20px 0;
      box-shadow: 0 8px 25px rgba(0,0,0,0.6);
      transition: transform 0.3s ease;
    }
    #photo-img:hover {
      transform: scale(1.02);
    }
    
    #photo-desc {
      margin: 15px 0 25px;
      opacity: 0.95;
      font-size: 1.05rem;
    }
    
    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: linear-gradient(135deg, var(--accent), #00cc6a);
      color: #000;
      text-decoration: none;
      border-radius: 10px;
      font-weight: 700;      font-size: 1rem;
      transition: all 0.25s ease;
      border: none;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(0,255,136,0.4);
    }
    .btn:active {
      transform: translateY(-1px);
    }
    
    /* Glitch effect untuk judul */
    .glitch {
      position: relative;
      animation: glitch-skew 3s infinite linear alternate-reverse;
    }
    @keyframes glitch-skew {
      0% { text-shadow: 0 0 0 var(--accent); }
      2% { text-shadow: 2px 0 #ff00ff, -2px 0 #00ffff; }
      4% { text-shadow: 0 0 0 var(--accent); }
      100% { text-shadow: 0 0 0 var(--accent); }
    }
    
    /* Responsive */
    @media (max-width: 600px) {
      #photo-title { font-size: 1.4rem; }
      #photo-desc { font-size: 0.95rem; }
      .btn { padding: 12px 24px; font-size: 0.9rem; }
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Loading State -->
    <div id="loading" class="hidden">
      <div style="font-size:2rem;margin-bottom:10px;">⏳</div>
      <div>Loading, tunggu bentar bangsat...</div>
    </div>
    
    <!-- Error State -->
    <div id="error" class="hidden"></div>
    
    <!-- Photo Display -->
    <div id="photo-container" class="hidden">
      <h1 id="photo-title" class="glitch"></h1>
      <img id="photo-img" src="" alt="Photo" />      <p id="photo-desc"></p>
      <a id="photo-link" href="#" target="_blank" class="btn">🔗 Buka Link Asli</a>
    </div>
  </div>

  <script>
    // === JAVASCRIPT INLINE - SPA ROUTING LOGIC ===
    (function() {
      'use strict';
      
      const DOM = {
        loading: document.getElementById('loading'),
        error: document.getElementById('error'),
        container: document.getElementById('photo-container'),
        title: document.getElementById('photo-title'),
        img: document.getElementById('photo-img'),
        desc: document.getElementById('photo-desc'),
        link: document.getElementById('photo-link')
      };

      // Helper: Show error message
      function showError(msg) {
        DOM.loading.classList.add('hidden');
        DOM.container.classList.add('hidden');
        DOM.error.textContent = '❌ ' + msg;
        DOM.error.classList.remove('hidden');
        console.error('[PhotoApp Error]', msg);
      }

      // Helper: Show photo data
      function showPhoto(data) {
        DOM.loading.classList.add('hidden');
        DOM.error.classList.add('hidden');
        
        DOM.title.textContent = data.title || 'Photo ' + data.name;
        DOM.img.src = data.url || '';
        DOM.img.alt = data.title || data.name;
        DOM.desc.textContent = data.desc || data.description || '';
        DOM.link.href = data.url || data.download_url || '#';
        
        // Kalau ada field tambahan, bisa ditambahin di sini
        if (data.extra_info) {
          DOM.desc.innerHTML += '<br><small style="opacity:0.7">' + data.extra_info + '</small>';
        }
        
        DOM.container.classList.remove('hidden');
      }

      // Main: Parse URL & Fetch Data
      async function init() {        // 1. Ambil path dari URL: /photo/2 -> "2"
        const path = window.location.pathname; // "/photo/2"
        const parts = path.split('/').filter(Boolean); // ["photo", "2"]
        
        // Validasi route
        if (parts[0] !== 'photo' || !parts[1]) {
          showError('URL nggak valid, bangsat! Format yang bener: /photo/{name}');
          return;
        }
        
        const photoName = decodeURIComponent(parts[1]); // "2" (handle special chars)
        DOM.loading.classList.remove('hidden');

        try {
          // 2. Fetch JSON dari DB - pakai cache busting kalau perlu
          const jsonUrl = '/DB/photos.json?t=' + Date.now();
          const res = await fetch(jsonUrl, { 
            method: 'GET',
            headers: { 'Accept': 'application/json' }
          });
          
          if (!res.ok) {
            throw new Error('Gagal load photos.json (Status: ' + res.status + '), cek lagi bangsat!');
          }
          
          const photos = await res.json();
          
          // 3. Cari data yang name-nya COCOK (case-insensitive, type-flexible)
          const photo = photos.find(p => 
            String(p.name).toLowerCase() === String(photoName).toLowerCase()
          );
          
          if (!photo) {
            // Coba kasih saran kalau ada yang mirip
            const similar = photos.filter(p => 
              String(p.name).toLowerCase().includes(String(photoName).toLowerCase())
            );
            let msg = 'Foto dengan name "' + photoName + '" nggak ditemukan, ngapain lo request sih?';
            if (similar.length > 0) {
              msg += '<br><br>💡 Mungkin maksud lo: ' + similar.map(s => 
                '<a href="/photo/'+s.name+'" style="color:var(--accent)">/photo/'+s.name+'</a>'
              ).join(', ');
            }
            showError(msg);
            return;
          }
          
          // 4. Tampilin data ke UI
          showPhoto(photo);
                  } catch (err) {
          console.error('[PhotoApp]', err);
          if (err.message.includes('Failed to fetch')) {
            showError('Waduh, nggak bisa connect ke server! Cek koneksi internet lo, bangsat!');
          } else {
            showError('Error nih: ' + err.message);
          }
        }
      }

      // Jalankan saat DOM ready
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
      
      // Optional: Handle browser back/forward button
      window.addEventListener('popstate', init);
      
    })();
  </script>
</body>
</html>

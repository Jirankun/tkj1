<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#121212"/>
  <title>TKJ1 Gallery</title>
  
  <!-- ⚠️ IKLAN SCRIPT (Jangan diubah) -->
  <script src="https://quge5.com/88/tag.min.js" data-zone="213278" async data-cfasync="false"></script>
  
  <!-- 🔐 Cloudflare Turnstile Script -->
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  
  <style>
    :root {
      --bg: #121212; --text: #ffffff; --accent: #00ff88; --error: #ff4444;
      --card-bg: #1e1e1e; --btn-app: #6c5ce7; --btn-app-hover: #5649c3;
      --list-item-bg: #252525; --list-item-hover: #333; --search-bg: #2a2a2a;
      --modal-overlay: rgba(0,0,0,0.95); --modal-bg: #1a1a2e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 15px; line-height: 1.6;
      user-select: none; -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none;
      overflow-x: hidden;
    }
    body.modal-open { overflow: hidden; }
    #app { max-width: 800px; width: 100%; }
    .hidden { display: none !important; visibility: hidden !important; }
    
    /* Header */
    .header { text-align: center; padding: 15px 0 20px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
    .header.hidden { display: none; }
    .header h1 { font-size: 1.6rem; color: var(--accent); text-shadow: 0 0 10px rgba(0,255,136,0.3); margin-bottom: 15px; }
    
    .controls { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; justify-content: center; }
    #search-input { flex: 1; min-width: 150px; padding: 12px 15px; border: 2px solid var(--accent); border-radius: 10px; background: var(--search-bg); color: var(--text); font-size: 1rem; outline: none; }
    #search-input:focus { border-color: #00cc6a; }
    #search-input::placeholder { color: rgba(255,255,255,0.5); }
    
    .filter-btn { padding: 12px 18px; background: var(--card-bg); border: 2px solid rgba(255,255,255,0.2); border-radius: 10px; color: var(--text); font-size: 0.9rem; cursor: pointer; transition: all 0.2s; }
    .filter-btn.active, .filter-btn:hover { background: var(--accent); color: #000; border-color: var(--accent); }
    
    .action-bar { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; background: linear-gradient(135deg, var(--accent), #00cc6a); color: #000; text-decoration: none; border-radius: 10px; font-weight: 600; font-size: 0.95rem; transition: all 0.25s ease; border: none; cursor: pointer; text-transform: uppercase; letter-spacing: 0.3px; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,255,136,0.3); }    .btn:active { transform: translateY(0); }
    .btn-app { background: linear-gradient(135deg, var(--btn-app), var(--btn-app-hover)); color: #fff; }
    .btn-app:hover { box-shadow: 0 6px 20px rgba(108,92,231,0.4); }
    .btn-secondary { background: var(--card-bg); color: var(--text); border: 2px solid rgba(255,255,255,0.2); }
    .btn-secondary:hover { background: #333; border-color: var(--accent); }    
    
    /* Loading & Error */
    #loading, #error { font-size: 1.1rem; padding: 25px; background: var(--card-bg); border-radius: 12px; margin: 20px 0; text-align: center; }
    #error { color: var(--error); border: 2px solid var(--error); animation: shake 0.5s ease-in-out; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
    .glitch { position: relative; animation: glitch-skew 3s infinite linear alternate-reverse; }
    @keyframes glitch-skew { 0% { text-shadow: 0 0 0 var(--accent); } 2% { text-shadow: 2px 0 #ff00ff, -2px 0 #00ffff; } 4% { text-shadow: 0 0 0 var(--accent); } 100% { text-shadow: 0 0 0 var(--accent); } }
    
    /* Gallery List */
    #gallery-section { background: var(--card-bg); border-radius: 16px; padding: 15px; margin-top: 10px; }
    #gallery-section.hidden { display: none; }
    #gallery-section h2 { text-align: center; margin-bottom: 15px; color: var(--accent); font-size: 1.3rem; }
    #gallery-list { display: flex; flex-direction: column; gap: 10px; contain: content; }
    
    .list-item { display: flex; align-items: center; gap: 12px; padding: 12px 15px; background: var(--list-item-bg); border-radius: 12px; cursor: pointer; transition: all 0.2s ease; border: 2px solid transparent; }
    .list-item:hover { background: var(--list-item-hover); transform: translateX(5px); border-color: rgba(0,255,136,0.3); }
    .list-item.active { border-color: var(--accent); background: linear-gradient(135deg, rgba(0,255,136,0.1), transparent); box-shadow: 0 0 0 2px rgba(0,255,136,0.3); }
    .list-thumb { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; flex-shrink: 0; background: #333; pointer-events: none; -webkit-user-drag: none; }
    .list-info { flex: 1; min-width: 0; text-align: left; }
    .list-name { font-weight: 600; font-size: 1rem; color: var(--text); margin-bottom: 3px; }
    .list-meta { font-size: 0.8rem; opacity: 0.7; display: flex; gap: 10px; flex-wrap: wrap; }
    .list-badge { background: rgba(0,255,136,0.2); color: var(--accent); padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; }
    .list-badge.video { background: rgba(108,92,231,0.2); color: #a78bfa; }
    
    /* Toast */
    #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--card-bg); color: var(--text); padding: 12px 24px; border-radius: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.4); transition: transform 0.3s ease; z-index: 3000; font-size: 0.95rem; text-align: center; max-width: 90vw; white-space: pre-line; }
    #toast.show { transform: translateX(-50%) translateY(0); }
    
    /* === MAIN TURNSTILE MODAL (GATEKEEPER) === */
    #main-turnstile-modal {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: var(--modal-overlay);
      display: flex !important; align-items: center; justify-content: center;
      z-index: 9999;
      animation: modalFadeIn 0.3s ease-out;
      backdrop-filter: blur(5px);
    }
    #main-turnstile-modal.hidden { 
      display: none !important; 
      visibility: hidden !important;
      opacity: 0 !important;
      pointer-events: none !important;
    }
    
    .main-turnstile-content {      background: var(--modal-bg); border-radius: 20px; padding: 40px 30px;
      width: 90%; max-width: 450px; text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6); border: 2px solid var(--accent);
      animation: modalSlideIn 0.4s ease-out;
    }
    .main-turnstile-title { font-size: 1.5rem; color: var(--accent); margin-bottom: 10px; }
    .main-turnstile-desc { opacity: 0.8; margin-bottom: 25px; font-size: 0.95rem; }
    .turnstile-box { display: flex; justify-content: center; margin: 20px 0; min-height: 65px; }
    .turnstile-note { font-size: 0.85rem; opacity: 0.7; margin-top: 15px; }
    
    /* === DOWNLOAD TURNSTILE MODAL === */
    #download-turnstile-modal {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: var(--modal-overlay);
      display: flex !important; align-items: center; justify-content: center;
      z-index: 2200;
      animation: modalFadeIn 0.3s ease-out;
    }
    #download-turnstile-modal.hidden { 
      display: none !important; 
      visibility: hidden !important;
      opacity: 0 !important;
      pointer-events: none !important;
    }
    
    .turnstile-modal-content {
      background: var(--modal-bg); border-radius: 20px; padding: 30px;
      width: 90%; max-width: 420px; text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6); border: 2px solid var(--accent);
      animation: modalSlideIn 0.4s ease-out;
    }
    
    /* === PHOTO POPUP MODAL === */
    #photo-modal {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: var(--modal-overlay);
      display: flex !important; align-items: center; justify-content: center;
      z-index: 2500;
      padding: 20px;
      animation: modalFadeIn 0.3s ease-out;
    }
    #photo-modal.hidden { 
      display: none !important; 
      visibility: hidden !important;
      opacity: 0 !important;
      pointer-events: none !important;
    }
    
    .photo-modal-content {
      background: var(--modal-bg);      border-radius: 20px;
      padding: 25px;
      width: 100%;
      max-width: 700px;
      max-height: 90vh;
      overflow-y: auto;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      border: 2px solid var(--accent);
      animation: modalSlideIn 0.4s ease-out;
      position: relative;
    }
    
    .modal-close {
      position: absolute; top: 15px; right: 20px;
      font-size: 1.8rem; color: var(--text); background: none;
      border: none; cursor: pointer; width: 36px; height: 36px;
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center; transition: background 0.2s; z-index: 10;
    }
    .modal-close:hover { background: rgba(255,255,255,0.1); }
    
    .photo-modal-title { font-size: 1.5rem; color: var(--accent); margin-bottom: 15px; text-shadow: 0 0 10px rgba(0,255,136,0.3); }
    .photo-modal-media { max-width: 100%; max-height: 50vh; border-radius: 12px; margin: 10px auto; display: block; box-shadow: 0 8px 25px rgba(0,0,0,0.6); }
    .photo-modal-media img { -webkit-touch-callout: none; pointer-events: none; }
    .photo-modal-desc { margin: 15px 0; opacity: 0.95; font-size: 1rem; }
    .photo-modal-meta { opacity: 0.7; font-size: 0.85rem; margin-bottom: 20px; font-style: italic; }
    .photo-modal-footer { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 10px; }
    
    @keyframes modalFadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes modalSlideIn { from { transform: translateY(-30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    
    @media (max-width: 600px) {
      .header h1 { font-size: 1.3rem; }
      .photo-modal-title { font-size: 1.3rem; }
      .photo-modal-desc, .photo-modal-meta { font-size: 0.9rem; }
      .btn { padding: 9px 16px; font-size: 0.85rem; }
      .list-thumb { width: 50px; height: 50px; }
      .list-name { font-size: 0.95rem; }
      .controls { flex-direction: column; }
      #search-input { width: 100%; }
      .modal-content, .photo-modal-content, .turnstile-modal-content, .main-turnstile-content { padding: 20px 15px; }
      .photo-modal-media { max-height: 45vh; }
    }
  </style>
</head>
<body>
  <!-- ⚠️ PROTEKSI KONTEN -->
  <script>
    (function blockDownloads() {      ['contextmenu','selectstart','dragstart','copy','cut'].forEach(evt => 
        document.addEventListener(evt, e => { e.preventDefault(); return false; }, { passive: false })
      );
      let touchTimer;
      document.addEventListener('touchstart', e => { touchTimer = setTimeout(() => { e.preventDefault(); }, 500); }, { passive: false });
      document.addEventListener('touchmove', () => { clearTimeout(touchTimer); }, { passive: true });
      document.addEventListener('touchend', () => clearTimeout(touchTimer));
      document.addEventListener('touchcancel', () => clearTimeout(touchTimer));
    })();
  </script>

  <!-- 🔐 MAIN TURNSTILE MODAL (GATEKEEPER) -->
  <div id="main-turnstile-modal">
    <div class="main-turnstile-content">
      <div class="main-turnstile-title">🔐 Verifikasi Akses</div>
      <p class="main-turnstile-desc">Buktikan kamu manusia sebelum masuk ke gallery</p>
      <div class="turnstile-box">
        <div class="cf-turnstile"
             data-sitekey="0x4AAAAAACsh1EKuTtF6HdMQ"
             data-callback="onMainVerifySuccess"
             data-error-callback="onMainVerifyError"
             data-theme="dark"
             data-size="normal">
        </div>
      </div>
      <div id="main-turnstile-error" class="modal-error" style="color:var(--error);font-size:0.9rem;margin-top:10px;min-height:20px;"></div>
      <p class="turnstile-note">⚠️ Wajib verifikasi buat liat konten</p>
    </div>
  </div>

  <!-- 🔐 DOWNLOAD TURNSTILE MODAL -->
  <div id="download-turnstile-modal" class="hidden">
    <div class="turnstile-modal-content">
      <div class="modal-title">🤖 Verifikasi Download</div>
      <p class="modal-desc">Buktikan kamu manusia sebelum download APK</p>
      <div class="turnstile-box">
        <div class="cf-turnstile"
             data-sitekey="0x4AAAAAACsh1EKuTtF6HdMQ"
             data-callback="onDownloadVerifySuccess"
             data-error-callback="onDownloadVerifyError"
             data-theme="dark"
             data-size="compact">
        </div>
      </div>
      <div id="turnstile-error" class="modal-error" style="min-height:20px;"></div>
      <p class="turnstile-note">✅ Setelah verifikasi, download akan mulai otomatis</p>
    </div>
  </div>

  <!-- 🖼️ PHOTO POPUP MODAL -->  <div id="photo-modal" class="hidden">
    <div class="photo-modal-content">
      <button class="modal-close" id="photo-modal-close" aria-label="Tutup">✕</button>
      <h2 class="photo-modal-title" id="photo-modal-title"></h2>
      <img class="photo-modal-media" id="photo-modal-img" src="" alt="Photo" />
      <video class="photo-modal-media" id="photo-modal-video" src="" controls playsinline preload="metadata"></video>
      <p class="photo-modal-desc" id="photo-modal-desc"></p>
      <p class="photo-modal-meta" id="photo-modal-meta"></p>
      <div class="photo-modal-footer">
        <button id="btn-app-modal" class="btn btn-app">📱 Buka di TKJ OnE app</button>
        <button id="btn-share-modal" class="btn btn-secondary">🔗 Bagikan</button>
      </div>
    </div>
  </div>

  <!-- 🎯 APP CONTENT (Hidden Until Verified) -->
  <div id="app" class="hidden">
    <div class="header" id="main-header">
      <h1 class="glitch">📸 TKJ1 Gallery</h1>
      <div class="controls">
        <input type="text" id="search-input" placeholder="🔍 Cari nama foto..." autocomplete="off">
        <button class="filter-btn active" data-filter="all">Semua</button>
        <button class="filter-btn" data-filter="photo">Foto</button>
        <button class="filter-btn" data-filter="video">Video</button>
      </div>
      <div class="action-bar">
        <button id="btn-random" class="btn btn-secondary">🎲 Random</button>
        <button id="btn-share" class="btn btn-secondary">🔗 Bagikan</button>
        <button id="btn-app" class="btn btn-app">📱 Buka di TKJ OnE app</button>
        <!-- 🔐 Tombol Download dengan Turnstile -->
        <button id="btn-download" class="btn btn-secondary">⬇️ Download APK</button>
      </div>
    </div>

    <div id="loading" class="hidden"><div style="font-size:2rem;margin-bottom:10px;">⏳</div><div>Loading, tunggu bentar bangsat...</div></div>
    <div id="error" class="hidden"></div>

    <!-- GALLERY LIST -->
    <div id="gallery-section" class="hidden">
      <h2>🗂️ Daftar Foto</h2>
      <div id="gallery-list"></div>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    (function() {
      'use strict';
            const CONFIG = {
        APP_PACKAGES: ['com.tkjone.app', 'com.tkjone.app.debug'],
        APP_SCHEME: 'tkjone',
        DEEP_LINK_PATH: 'photo',
        FALLBACK_URL: 'https://github.com/Jirankun/TKJ-One/releases',
        BASE_URL: 'https://tkj1.pages.dev'
      };

      let allPhotos = [], filteredPhotos = [], currentIndex = -1;
      let isVerified = false;
      let isDirectPhotoView = false;
      let pendingDownloadUrl = null;
      let mainTurnstileWidgetId = null; // Store widget ID for reset

      const DOM = {
        mainTurnstileModal: document.getElementById('main-turnstile-modal'),
        mainTurnstileError: document.getElementById('main-turnstile-error'),
        
        downloadTurnstileModal: document.getElementById('download-turnstile-modal'),
        turnstileError: document.getElementById('turnstile-error'),
        
        photoModal: document.getElementById('photo-modal'),
        photoModalClose: document.getElementById('photo-modal-close'),
        photoModalTitle: document.getElementById('photo-modal-title'),
        photoModalImg: document.getElementById('photo-modal-img'),
        photoModalVideo: document.getElementById('photo-modal-video'),
        photoModalDesc: document.getElementById('photo-modal-desc'),
        photoModalMeta: document.getElementById('photo-modal-meta'),
        btnAppModal: document.getElementById('btn-app-modal'),
        btnShareModal: document.getElementById('btn-share-modal'),
        
        appContainer: document.getElementById('app'),
        header: document.getElementById('main-header'),
        loading: document.getElementById('loading'),
        error: document.getElementById('error'),
        gallerySection: document.getElementById('gallery-section'),
        searchInput: document.getElementById('search-input'),
        filterBtns: document.querySelectorAll('.filter-btn'),
        galleryList: document.getElementById('gallery-list'),
        btnApp: document.getElementById('btn-app'),
        btnShare: document.getElementById('btn-share'),
        btnRandom: document.getElementById('btn-random'),
        btnDownload: document.getElementById('btn-download'),
        toast: document.getElementById('toast')
      };

      // === UTILS ===
      function showToast(msg, duration = 3500) {
        DOM.toast.innerHTML = msg.replace(/\n/g, '<br>');
        DOM.toast.classList.add('show');        setTimeout(() => DOM.toast.classList.remove('show'), duration);
      }

      function showError(msg) {
        DOM.loading.classList.add('hidden');
        DOM.error.innerHTML = '❌ ' + msg;
        DOM.error.classList.remove('hidden');
        console.error('[PhotoApp Error]', msg);
      }

      function isVideo(url) {
        if (!url) return false;
        const lower = url.toLowerCase();
        return lower.includes('.mp4') || lower.includes('.webm') || lower.includes('video');
      }

      function protectMedia(el) {
        if (!el) return;
        ['contextmenu','dragstart','selectstart'].forEach(evt => 
          el.addEventListener(evt, e => { e.preventDefault(); return false; }, { passive: false })
        );
        if (el.tagName === 'IMG') {
          el.style.pointerEvents = 'none';
          el.style.webkitUserSelect = 'none';
          el.style.webkitTouchCallout = 'none';
        }
      }

      // 🔐 === MAIN TURNSTILE CALLBACKS (GATEKEEPER) - FIXED ===
      window.onMainVerifySuccess = function(token) {
        console.log('✓ Main Turnstile verified:', token);
        DOM.mainTurnstileError.textContent = '';
        isVerified = true;
        
        // Reset Turnstile widget dulu
        if (window.turnstile && mainTurnstileWidgetId) {
          turnstile.reset(mainTurnstileWidgetId);
        }
        
        // Hide modal dengan delay biar Turnstile selesai render
        setTimeout(() => {
          DOM.mainTurnstileModal.classList.add('hidden');
          DOM.mainTurnstileModal.style.display = 'none';
          DOM.appContainer.classList.remove('hidden');
          document.body.classList.remove('modal-open');
          
          // Init gallery setelah modal ilang
          setTimeout(() => {
            initGallery();
          }, 100);        }, 300);
      };

      window.onMainVerifyError = function() {
        console.error('✗ Main Turnstile error');
        DOM.mainTurnstileError.textContent = 'Verifikasi gagal. Coba lagi.';
        setTimeout(() => {
          if (window.turnstile && mainTurnstileWidgetId) {
            turnstile.reset(mainTurnstileWidgetId);
          }
        }, 3000);
      };

      // 🔐 === DOWNLOAD TURNSTILE CALLBACKS ===
      function showDownloadTurnstileModal(downloadUrl) {
        pendingDownloadUrl = downloadUrl;
        DOM.downloadTurnstileModal.classList.remove('hidden');
        DOM.downloadTurnstileModal.style.display = 'flex';
        DOM.turnstileError.textContent = '';
        document.body.classList.add('modal-open');
        
        if (window.turnstile) {
          setTimeout(() => turnstile.reset(), 100);
        }
      }

      function hideDownloadTurnstileModal() {
        DOM.downloadTurnstileModal.classList.add('hidden');
        DOM.downloadTurnstileModal.style.display = 'none';
        document.body.classList.remove('modal-open');
        pendingDownloadUrl = null;
        if (window.turnstile) turnstile.reset();
      }

      window.onDownloadVerifySuccess = function(token) {
        console.log('✓ Download Turnstile token:', token);
        DOM.turnstileError.textContent = '';
        
        if (pendingDownloadUrl) {
          showToast('✅ Verifikasi berhasil! Download dimulai...');
          setTimeout(() => {
            window.location.href = pendingDownloadUrl;
            hideDownloadTurnstileModal();
          }, 800);
        }
      };

      window.onDownloadVerifyError = function() {
        console.error('✗ Download Turnstile error');
        DOM.turnstileError.textContent = 'Verifikasi gagal. Coba lagi.';        setTimeout(() => {
          if (window.turnstile) turnstile.reset();
        }, 3000);
      };

      // === PHOTO POPUP MODAL ===
      function showPhotoModal(data) {
        DOM.photoModal.classList.remove('hidden');
        DOM.photoModal.style.display = 'flex';
        document.body.classList.add('modal-open');
        
        DOM.photoModalTitle.textContent = data.title || 'Photo #' + data.name;
        const mediaUrl = (data.url || '').trim();
        const videoMode = isVideo(mediaUrl);
        
        DOM.photoModalImg.style.display = videoMode ? 'none' : 'block';
        DOM.photoModalVideo.style.display = videoMode ? 'block' : 'none';
        
        if (videoMode) {
          DOM.photoModalVideo.src = mediaUrl;
          DOM.photoModalVideo.load();
          DOM.photoModalImg.src = '';
        } else {
          DOM.photoModalImg.src = mediaUrl;
          DOM.photoModalVideo.src = '';
          protectMedia(DOM.photoModalImg);
        }
        
        DOM.photoModalDesc.textContent = data.desc || data.description || '';
        DOM.photoModalMeta.textContent = `Gender: ${data.gender || '-'} | Date: ${data.date || '-'}`;
        
        setupAppButtonModal(data);
        setupShareModal(data);
        
        DOM.photoModalClose.onclick = closePhotoModal;
        DOM.photoModal.onclick = (e) => { if (e.target === DOM.photoModal) closePhotoModal(); };
        document.addEventListener('keydown', handleModalKeydown);
      }

      function closePhotoModal() {
        DOM.photoModal.classList.add('hidden');
        DOM.photoModal.style.display = 'none';
        document.body.classList.remove('modal-open');
        DOM.photoModalVideo.pause();
        DOM.photoModalVideo.src = '';
        DOM.photoModalImg.src = '';
        DOM.photoModalClose.onclick = null;
        DOM.photoModal.onclick = null;
        document.removeEventListener('keydown', handleModalKeydown);
      }
      function handleModalKeydown(e) {
        if (e.key === 'Escape') closePhotoModal();
      }

      // === GALLERY LIST ===
      function renderGalleryList(photos) {
        DOM.galleryList.innerHTML = '';
        if (photos.length === 0) {
          DOM.galleryList.innerHTML = '<p style="text-align:center;opacity:0.7;padding:20px">Nggak ada foto yang cocok, bangsat!</p>';
          return;
        }
        const fragment = document.createDocumentFragment();
        photos.forEach((photo) => {
          const item = document.createElement('div');
          item.className = 'list-item';
          item.dataset.name = photo.name;
          const isVid = isVideo(photo.url);
          const thumb = isVid 
            ? `<video class="list-thumb" src="${photo.url}" muted preload="none"></video>`
            : `<img class="list-thumb" src="${photo.url}" alt="${photo.title||photo.name}" loading="lazy">`;
          item.innerHTML = `
            ${thumb}
            <div class="list-info">
              <div class="list-name">#${photo.name} ${photo.title ? '• ' + photo.title : ''}</div>
              <div class="list-meta">
                <span class="list-badge ${isVid ? 'video' : ''}">${isVid ? '🎬 Video' : '📷 Foto'}</span>
                ${photo.gender ? `<span>👤 ${photo.gender}</span>` : ''}
                ${photo.date ? `<span>📅 ${photo.date}</span>` : ''}
              </div>
            </div>
          `;
          item.addEventListener('click', () => {
            const photoData = allPhotos.find(p => p.name === photo.name);
            if (photoData) showPhotoModal(photoData);
          });
          const mediaEl = item.querySelector('img, video');
          if (mediaEl) {
            ['contextmenu','dragstart','selectstart'].forEach(evt => 
              mediaEl.addEventListener(evt, e => { e.preventDefault(); return false; }, { passive: false })
            );
            mediaEl.style.pointerEvents = 'none';
          }
          fragment.appendChild(item);
        });
        DOM.galleryList.appendChild(fragment);
      }

      // === DEEP LINK LOGIC (NO TURNSTILE - Smooth for APK users) ===
      function setupAppButton(data) {        const handler = () => openAppWithMultiFallback(data.name);
        DOM.btnApp.onclick = handler;
        DOM.btnApp.style.display = 'inline-flex';
      }

      function setupAppButtonModal(data) {
        const handler = () => openAppWithMultiFallback(data.name);
        DOM.btnAppModal.onclick = handler;
        DOM.btnAppModal.style.display = 'inline-flex';
      }

      function buildIntentUrl(photoId, packageName) {
        const host = 'tkj1.pages.dev', path = `/photo/${photoId}`, scheme = CONFIG.APP_SCHEME;
        const fallback = encodeURIComponent(CONFIG.FALLBACK_URL);
        return `intent://${host}${path}#Intent;scheme=${scheme};package=${packageName};S.browser_fallback_url=${fallback};end`;
      }

      function buildCustomSchemeUrl(photoId) {
        return `${CONFIG.APP_SCHEME}://${CONFIG.DEEP_LINK_PATH}/${photoId}`;
      }

      function tryOpenUrl(url, timeout = 2500) {
        return new Promise((resolve) => {
          let resolved = false, visibilityChanged = false;
          const onVisibilityChange = () => { if (document.hidden && !resolved) { resolved = true; visibilityChanged = true; document.removeEventListener('visibilitychange', onVisibilityChange); resolve(true); } };
          document.addEventListener('visibilitychange', onVisibilityChange);
          const onBlur = () => { if (!resolved) { resolved = true; window.removeEventListener('blur', onBlur); resolve(true); } };
          window.addEventListener('blur', onBlur, { once: true });
          console.log('[TKJ OnE] Opening:', url);
          try { window.location.href = url; } catch (e) { console.error('[TKJ OnE] Error:', e); }
          setTimeout(() => { if (!resolved) { document.removeEventListener('visibilitychange', onVisibilityChange); window.removeEventListener('blur', onBlur); resolve(visibilityChanged || document.hidden); } }, timeout);
        });
      }

      async function openAppWithMultiFallback(photoId) {
        console.log('[TKJ OnE] 🚀 Deep link for:', photoId);
        
        const schemeUrl = buildCustomSchemeUrl(photoId);
        console.log('[TKJ OnE] Strategy 1: Custom Scheme ->', schemeUrl);
        const schemeOpened = await tryOpenUrl(schemeUrl, 2000);
        if (schemeOpened) { console.log('[TKJ OnE] ✅ App opened via custom scheme'); return; }
        
        console.log('[TKJ OnE] ❌ Custom scheme failed');
        
        for (const pkg of CONFIG.APP_PACKAGES) {
          const intentUrl = buildIntentUrl(photoId, pkg);
          console.log('[TKJ OnE] Trying package:', pkg);
          const intentOpened = await tryOpenUrl(intentUrl, 2000);
          if (intentOpened) { console.log(`[TKJ OnE] ✅ App opened via intent (${pkg})`); return; }
          console.log(`[TKJ OnE] ❌ Intent failed: ${pkg}`);        }
        
        const httpsUrl = `${CONFIG.BASE_URL}/photo/${photoId}`;
        const httpsOpened = await tryOpenUrl(httpsUrl, 1500);
        if (httpsOpened && document.hidden) { console.log('[TKJ OnE] ✅ App opened via HTTPS'); return; }
        
        console.log('[TKJ OnE] ❌ ALL FAILED -> Show Turnstile for download');
        showToast('📱 App tidak ditemukan. Verifikasi dulu buat download...');
        setTimeout(() => {
          showDownloadTurnstileModal(CONFIG.FALLBACK_URL);
        }, 500);
      }

      // 🔐 === DOWNLOAD BUTTON HANDLER (Turnstile Protected) ===
      function setupDownloadButton() {
        DOM.btnDownload.onclick = (e) => {
          e.preventDefault();
          showDownloadTurnstileModal(CONFIG.FALLBACK_URL);
        };
      }

      // === SHARE FEATURE ===
      function setupShare() {
        DOM.btnShare.onclick = async () => {
          const activeItem = DOM.galleryList.querySelector('.list-item.active');
          const name = activeItem?.dataset.name || getCurrentPhotoName();
          if (!name) { showToast('Pilih foto dulu, bangsat!'); return; }
          showShareDialog(name);
        };
      }

      function setupShareModal(data) {
        DOM.btnShareModal.onclick = () => showShareDialog(data.name);
      }

      function showShareDialog(name) {
        const shareText = `Buka foto ini di TKJ OnE
📷 ${name}

Buka di aplikasi:
tkjone://photo/${name}

Atau kunjungi:
${CONFIG.BASE_URL}/photo/${name}`;
        
        if (navigator.share) {
          navigator.share({ title: 'TKJ OnE Gallery', text: shareText })
            .then(() => showToast('🔗 Berhasil dibagikan!'))
            .catch(() => {});
        } else {          navigator.clipboard.writeText(shareText)
            .then(() => showToast('🔗 Link disalin!\n\n' + shareText, 4500))
            .catch(() => showToast('Gagal menyalin link'));
        }
      }

      function getCurrentPhotoName() {
        const active = DOM.galleryList.querySelector('.list-item.active');
        return active ? active.dataset.name : null;
      }

      // === FILTER & SEARCH ===
      function applyFilters() {
        const query = DOM.searchInput.value.toLowerCase().trim();
        const activeFilter = document.querySelector('.filter-btn.active')?.dataset.filter || 'all';
        filteredPhotos = allPhotos.filter(p => {
          const matchSearch = !query || String(p.name).toLowerCase().includes(query) || (p.title && p.title.toLowerCase().includes(query)) || (p.desc && p.desc.toLowerCase().includes(query));
          const matchType = activeFilter === 'all' || (activeFilter === 'video' && isVideo(p.url)) || (activeFilter === 'photo' && !isVideo(p.url));
          return matchSearch && matchType;
        });
        if (isVerified) renderGalleryList(filteredPhotos);
      }

      function setupRandom() {
        DOM.btnRandom.onclick = () => {
          if (filteredPhotos.length === 0) { showToast('Nggak ada foto, bangsat!'); return; }
          const randomIdx = Math.floor(Math.random() * filteredPhotos.length);
          showPhotoModal(filteredPhotos[randomIdx]);
        };
      }

      // === HIDE/SHOW HEADER ===
      function setHeaderVisibility(show) {
        if (DOM.header) DOM.header.classList.toggle('hidden', !show);
      }

      // === INIT GALLERY (Called AFTER Turnstile Success) ===
      async function initGallery() {
        const path = window.location.pathname;
        const parts = path.split('/').filter(Boolean);
        const initialPhotoName = (parts[0] === 'photo' && parts[1]) ? decodeURIComponent(parts[1]) : null;

        try {
          DOM.loading.classList.remove('hidden');
          
          const res = await fetch('/DB/photos.json?t=' + Date.now());
          if (!res.ok) throw new Error('Gagal load JSON (Status: ' + res.status + ')');
          const rawData = await res.json();
          allPhotos = Array.isArray(rawData) ? rawData : (rawData.photos || rawData.data || []);
          if (!Array.isArray(allPhotos)) throw new Error('Struktur JSON nggak dikenali!');          
          allPhotos.sort((a, b) => {
            const na = parseInt(a.name), nb = parseInt(b.name);
            if (!isNaN(na) && !isNaN(nb)) return na - nb;
            return String(a.name).localeCompare(String(b.name));
          });
          
          filteredPhotos = [...allPhotos];
          
          setupShare(); 
          setupRandom(); 
          setupDownloadButton();
          
          DOM.searchInput.addEventListener('input', applyFilters);
          DOM.filterBtns.forEach(btn => {
            btn.onclick = () => {
              DOM.filterBtns.forEach(b => b.classList.remove('active'));
              btn.classList.add('active'); applyFilters();
            };
          });          
          
          DOM.loading.classList.add('hidden');
          
          if (initialPhotoName) {
            isDirectPhotoView = true;
            setHeaderVisibility(false);
            DOM.gallerySection.classList.add('hidden');
            
            const photo = allPhotos.find(p => String(p.name).toLowerCase() === String(initialPhotoName).toLowerCase());
            if (photo) {
              showPhotoModal(photo);
            } else {
              showError(`Foto "${initialPhotoName}" nggak ditemukan!`);
              setTimeout(() => { 
                setHeaderVisibility(true);
                DOM.gallerySection.classList.remove('hidden');
                renderGalleryList(filteredPhotos);
              }, 1500);
            }
          } else {
            isDirectPhotoView = false;
            setHeaderVisibility(true);
            DOM.gallerySection.classList.remove('hidden');
            renderGalleryList(filteredPhotos);
          }
        } catch (err) {
          console.error('[PhotoApp]', err);
          DOM.loading.classList.add('hidden');
          if (err.message.includes('Failed to fetch')) showError('Nggak bisa connect ke server! Cek koneksi internet lo!');
          else showError('Error: ' + err.message);        }
      }

      window.addEventListener('popstate', (e) => {
        if (e.state?.photo && !DOM.photoModal.classList.contains('hidden')) {
          const photo = allPhotos.find(p => p.name === e.state.photo);
          if (photo) showPhotoModal(photo);
        }
      });

      // Capture Turnstile widget ID when rendered
      document.addEventListener('DOMContentLoaded', () => {
        // Turnstile will auto-render based on data-callback
      });

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => {});
      }
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#121212"/>
  <title>Gallery Photo - TKJ1</title>
  <!-- ⚠️ IKLAN SCRIPT (Jangan diubah) -->
  <script src="https://quge5.com/88/tag.min.js" data-zone="213278" async data-cfasync="false"></script>
<style>
    /* === CSS INLINE - DARK THEME === */
    :root {
      --bg: #121212;
      --text: #ffffff;
      --accent: #00ff88;
      --error: #ff4444;
      --card-bg: #1e1e1e;
      --btn-app: #6c5ce7;
      --btn-app-hover: #5649c3;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      line-height: 1.6;
    }
    #app {
      max-width: 800px;
      width: 100%;
      text-align: center;
    }
    .hidden { display: none !important; }
    
    /* Loading & Error */
    #loading, #error {
      font-size: 1.1rem;
      padding: 25px;
      background: var(--card-bg);
      border-radius: 12px;
      margin: 20px 0;
    }
    #error {
      color: var(--error);
      border: 2px solid var(--error);
      animation: shake 0.5s ease-in-out;
    }    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
    
    /* Photo Container */
    #photo-container {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 25px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
      animation: fadeIn 0.4s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    #photo-title {
      font-size: 1.8rem;
      margin-bottom: 15px;
      color: var(--accent);
      text-shadow: 0 0 10px rgba(0,255,136,0.3);
    }
    
    /* Image & Video - CENTERED! */
    #photo-img, #photo-video {
      max-width: 100%;
      height: auto;
      border-radius: 12px;
      margin: 20px auto;
      display: block;
      box-shadow: 0 8px 25px rgba(0,0,0,0.6);
      transition: transform 0.3s ease;
    }
    #photo-img:hover, #photo-video:hover { transform: scale(1.02); }
    
    #photo-desc {
      margin: 15px 0 25px;
      opacity: 0.95;
      font-size: 1.05rem;
    }
    #photo-meta {
      opacity: 0.7;
      font-size: 0.9rem;
      margin-bottom: 20px;
      font-style: italic;
    }
        /* Button Group */
    .btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-top: 10px;
    }
    
    /* Primary Button */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      background: linear-gradient(135deg, var(--accent), #00cc6a);
      color: #000;
      text-decoration: none;
      border-radius: 10px;
      font-weight: 700;
      font-size: 1rem;
      transition: all 0.25s ease;
      border: none;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(0,255,136,0.4);
    }
    .btn:active { transform: translateY(-1px); }
    
    /* App Button - Purple Theme */
    .btn-app {
      background: linear-gradient(135deg, var(--btn-app), var(--btn-app-hover));
      color: #fff;
    }
    .btn-app:hover { box-shadow: 0 8px 25px rgba(108,92,231,0.5); }
    
    /* Glitch effect */
    .glitch {
      position: relative;
      animation: glitch-skew 3s infinite linear alternate-reverse;
    }
    @keyframes glitch-skew {
      0% { text-shadow: 0 0 0 var(--accent); }
      2% { text-shadow: 2px 0 #ff00ff, -2px 0 #00ffff; }
      4% { text-shadow: 0 0 0 var(--accent); }
      100% { text-shadow: 0 0 0 var(--accent); }    }
    
    @media (max-width: 600px) {
      #photo-title { font-size: 1.4rem; }
      #photo-desc, #photo-meta { font-size: 0.95rem; }
      .btn { padding: 12px 20px; font-size: 0.9rem; }
      .btn-group { flex-direction: column; align-items: center; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="loading" class="hidden">
      <div style="font-size:2rem;margin-bottom:10px;">⏳</div>
      <div>Loading, tunggu bentar bangsat...</div>
    </div>
    <div id="error" class="hidden"></div>
    <div id="photo-container" class="hidden">
      <h1 id="photo-title" class="glitch"></h1>
      <img id="photo-img" src="" alt="Photo" />
      <video id="photo-video" src="" controls playsinline preload="metadata"></video>
      <p id="photo-desc"></p>
      <p id="photo-meta"></p>
      <div class="btn-group">
        <a id="photo-link" href="#" target="_blank" class="btn">🔗 Buka Link Asli</a>
        <button id="btn-app" class="btn btn-app">📱 Buka di TKJ OnE</button>
      </div>
    </div>
  </div>

  <script>
    (function() {
      'use strict';
      
      const CONFIG = {
        // ⚠️ MULTIPLE PACKAGES: Release + Debug
        APP_PACKAGES: ['com.tkjone.app', 'com.tkjone.app.debug'],
        APP_SCHEME: 'tkjone',
        FALLBACK_URL: 'https://github.com/Jirankun/TKJ-One/releases'
      };

      const DOM = {
        loading: document.getElementById('loading'),
        error: document.getElementById('error'),
        container: document.getElementById('photo-container'),
        title: document.getElementById('photo-title'),
        img: document.getElementById('photo-img'),
        video: document.getElementById('photo-video'),
        desc: document.getElementById('photo-desc'),
        meta: document.getElementById('photo-meta'),        link: document.getElementById('photo-link'),
        btnApp: document.getElementById('btn-app')
      };

      function showError(msg) {
        DOM.loading.classList.add('hidden');
        DOM.container.classList.add('hidden');
        DOM.error.innerHTML = '❌ ' + msg;
        DOM.error.classList.remove('hidden');
        console.error('[PhotoApp Error]', msg);
      }

      function isVideo(url) {
        if (!url) return false;
        const lower = url.toLowerCase();
        return lower.includes('.mp4') || lower.includes('.webm') || lower.includes('video');
      }

      function showPhoto(data) {
        DOM.loading.classList.add('hidden');
        DOM.error.classList.add('hidden');
        DOM.container.classList.remove('hidden');
        
        DOM.title.textContent = data.title || 'Photo #' + data.name;
        
        const mediaUrl = (data.url || '').trim();
        const videoMode = isVideo(mediaUrl);
        
        DOM.img.style.display = videoMode ? 'none' : 'block';
        DOM.video.style.display = videoMode ? 'block' : 'none';
        
        if (videoMode) {
          DOM.video.src = mediaUrl;
          DOM.img.src = '';
        } else {
          DOM.img.src = mediaUrl;
          DOM.video.src = '';
        }
        
        DOM.desc.textContent = data.desc || data.description || '';
        DOM.meta.textContent = `Gender: ${data.gender || '-'} | Date: ${data.date || '-'}`;
        DOM.link.href = mediaUrl || '#';
        
        setupAppButton(data);
      }

      function setupAppButton(data) {
        const photoName = data.name;
        const deepLink = data.deep_link || data.app_url || null;
                if (deepLink) {
          DOM.btnApp.onclick = () => openAppWithMultiFallback(deepLink);
        } else {
          DOM.btnApp.onclick = () => openAppWithMultiFallback(null, photoName);
        }
        
        DOM.btnApp.style.display = 'inline-flex';
      }

      function buildIntentUrl(photoId, packageName) {
        const host = 'tkj1.pages.dev';
        const path = `/photo/${photoId}`;
        const scheme = CONFIG.APP_SCHEME;
        const fallback = encodeURIComponent(CONFIG.FALLBACK_URL);
        
        return `intent://${host}${path}#Intent;scheme=${scheme};package=${packageName};S.browser_fallback_url=${fallback};end`;
      }

      function tryOpenUrl(url) {
        return new Promise((resolve) => {
          let resolved = false;
          const onBlur = () => {
            if (!resolved) {
              resolved = true;
              window.removeEventListener('blur', onBlur);
              resolve(true); // App opened!
            }
          };
          
          window.addEventListener('blur', onBlur, { once: true });
          console.log('[TKJ OnE] Trying:', url);
          window.location.href = url;
          
          // If no blur after timeout, assume failed
          setTimeout(() => {
            if (!resolved) {
              window.removeEventListener('blur', onBlur);
              resolve(false);
            }
          }, 1200);
        });
      }

      async function openAppWithMultiFallback(customDeepLink, photoId) {
        console.log('[TKJ OnE] Starting multi-package deep link attempt...');
        
        // Strategy 1: Custom Scheme (works for BOTH release & debug if both register tkjone://)
        if (customDeepLink) {
          const opened = await tryOpenUrl(customDeepLink);
          if (opened) {            console.log('[TKJ OnE] ✅ App opened via custom deep link');
            return;
          }
          console.log('[TKJ OnE] ❌ Custom deep link failed');
        } else if (photoId) {
          const schemeUrl = `${CONFIG.APP_SCHEME}://gallery/${photoId}`;
          const opened = await tryOpenUrl(schemeUrl);
          if (opened) {
            console.log('[TKJ OnE] ✅ App opened via custom scheme');
            return;
          }
          console.log('[TKJ OnE] ❌ Custom scheme failed');
        }
        
        // Strategy 2: Intent URL with multiple packages (release → debug)
        for (const pkg of CONFIG.APP_PACKAGES) {
          if (!photoId) continue;
          const intentUrl = buildIntentUrl(photoId, pkg);
          const opened = await tryOpenUrl(intentUrl);
          if (opened) {
            console.log(`[TKJ OnE] ✅ App opened via intent (package: ${pkg})`);
            return;
          }
          console.log(`[TKJ OnE] ❌ Intent failed for package: ${pkg}`);
        }
        
        // Strategy 3: Final fallback to GitHub Releases
        console.log('[TKJ OnE] ❌ All attempts failed, redirecting to GitHub Releases...');
        window.location.href = CONFIG.FALLBACK_URL;
      }

      async function init() {
        const path = window.location.pathname;
        const parts = path.split('/').filter(Boolean);
        
        if (parts[0] !== 'photo' || !parts[1]) {
          showError('URL nggak valid, bangsat! Format: /photo/{name}');
          return;
        }
        
        const photoName = decodeURIComponent(parts[1]);
        DOM.loading.classList.remove('hidden');
        DOM.btnApp.style.display = 'none';

        try {
          const res = await fetch('/DB/photos.json?t=' + Date.now());
          if (!res.ok) throw new Error('Gagal load JSON (Status: ' + res.status + ')');
          
          const rawData = await res.json();
          const photosArray = Array.isArray(rawData) ? rawData : (rawData.photos || rawData.data || []);          
          if (!Array.isArray(photosArray)) {
            throw new Error('Struktur JSON nggak dikenali! Harusnya { "photos": [...] } atau array langsung.');
          }
          
          const photo = photosArray.find(p => 
            String(p.name).toLowerCase() === String(photoName).toLowerCase()
          );
          
          if (!photo) {
            const similar = photosArray.filter(p => 
              String(p.name).toLowerCase().includes(String(photoName).toLowerCase())
            );
            let msg = 'Foto dengan name "' + photoName + '" nggak ditemukan!';
            if (similar.length > 0) {
              msg += '<br><br>💡 Mungkin maksud lo: ' + similar.slice(0,3).map(s => 
                '<a href="/photo/'+s.name+'" style="color:var(--accent)">/photo/'+s.name+'</a>'
              ).join(', ');
            }
            showError(msg);
            return;
          }
          
          showPhoto(photo);
          
        } catch (err) {
          console.error('[PhotoApp]', err);
          if (err.message.includes('Failed to fetch')) {
            showError('Nggak bisa connect ke server! Cek koneksi internet lo!');
          } else {
            showError('Error: ' + err.message);
          }
        }
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
      
      window.addEventListener('popstate', init);
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#09090b" />
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="description" content="TKJ OnE Gallery - Arsip visual perjalanan siswa TKJ OnE"/>
  <meta name="author" content="TKJ OnE - Jirankun"/>
  <meta name="robots" content="index, follow"/>
  <link rel="canonical" href="https://tkj1.pages.dev/"/>
  <meta property="og:type" content="website"/>
  <meta property="og:title" content="TKJ OnE Gallery"/>
  <meta property="og:image" content="https://tkj1.pages.dev/og-image.jpg"/>
  <title>TKJ OnE Gallery</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico"/>
  
  <!-- 🔐 TURNSTILE -->
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

  <style>
    :root {
      --bg: #09090b; --surface: #18181b; --surface-hover: #27272a;
      --border: #27272a; --text: #fafafa; --text-muted: #a1a1aa;
      --accent: #3b82f6; --accent-hover: #2563eb; --error: #ef4444;
      --header-pad: 14px; --radius: 14px;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { scroll-behavior: smooth; overflow-x: hidden; }
    body { background: var(--bg); color: var(--text); line-height: 1.5; min-height: 100vh; }
    body.locked { overflow: hidden !important; position: fixed !important; width: 100%; top: var(--scroll-y, 0); left: 0; }
    .hidden { display: none !important; }

    /* 🚫 PC BLOCKER */
    #pc-blocker { position: fixed; inset: 0; background: var(--bg); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 99999; text-align: center; padding: 24px; }
    #pc-blocker.active { display: flex; }
    .pc-title { font-size: 1.4rem; font-weight: 700; margin: 12px 0; }
    .pc-desc { color: var(--text-muted); margin-bottom: 24px; max-width: 280px; font-size: 0.9rem; }

    /* 📢 MAIN STATUS SCREEN */
    #main-status { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 24px; }
    #main-status.active { display: flex; }
    .status-icon { font-size: 4rem; margin-bottom: 24px; }
    .status-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 16px; color: var(--text); }
    .status-message { color: var(--text-muted); font-size: 1rem; max-width: 500px; line-height: 1.6; }

    /* 🖼️ GALLERY CONTAINER */
    #gallery-container { position: fixed; inset: 0; z-index: 100; }
    #gallery-container.hidden { display: none; }
    #gallery-frame { width: 100%; height: 100%; border: none; }

    /* 💬 GISCUS FULLSCREEN */
    #giscus-full { position: fixed; inset: 0; background: var(--bg); z-index: 400; display: none; flex-direction: column; }
    #giscus-full.active { display: flex !important; }
    .giscus-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border); background: rgba(9,9,11,0.95); }
    .giscus-body { flex: 1; overflow-y: auto; padding: 12px; }

    /* 🛠️ UTILS */
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 16px; border-radius: 10px; font-weight: 600; font-size: 0.9rem; border: none; cursor: pointer; transition: 0.2s; }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .btn-ghost { background: transparent; color: var(--text-muted); }
    
    /* 🔐 TURNSTILE MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 300; display: none; align-items: center; justify-content: center; padding: 16px; backdrop-filter: blur(6px); }
    .modal-overlay.active { display: flex; }
    .turnstile-box { background: var(--surface); border-radius: var(--radius); width: 100%; max-width: 460px; text-align: center; padding: 28px 20px; border: 1px solid var(--border); animation: modalIn 0.25s ease; }
    @keyframes modalIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); }
  </style>
</head>
<body>

  <!-- 🚫 PC BLOCKER -->
  <div id="pc-blocker">
    <div style="font-size:2.5rem">📱</div>
    <h2 class="pc-title">Mobile Only</h2>
    <p class="pc-desc">Website ini dioptimalkan untuk perangkat mobile. Buka via HP untuk pengalaman terbaik.</p>
    <button class="btn btn-primary" onclick="window.location.href='https://jirankun.github.io/portofoliozhyllan'">Ke Portfolio</button>
  </div>

  <!-- 📢 MAIN STATUS SCREEN -->
  <div id="main-status">
    <div class="status-icon">⚠️</div>
    <h1 class="status-title">Pengumuman</h1>
    <p id="status-message" class="status-message"></p>
  </div>

  <!-- 🔐 TURNSTILE MODAL -->
  <div id="turnstile-modal" class="modal-overlay">
    <div class="turnstile-box">
      <div style="font-size:2rem;margin-bottom:8px">🔐</div>
      <h3 style="margin-bottom:6px">Verifikasi Keamanan</h3>
      <p style="color:var(--text-muted);margin-bottom:16px;font-size:0.85rem">Mohon tunggu sebentar...</p>
      <div style="display:flex;justify-content:center;min-height:65px"><div class="cf-turnstile" data-sitekey="0x4AAAAAACsh1EKuTtF6HdMQ" data-callback="onTS" data-error-callback="onTSErr" data-theme="dark"></div></div>
      <div id="ts-err" style="color:var(--error);font-size:0.8rem;margin-top:6px"></div>
      <button id="ts-fb" class="btn btn-ghost" onclick="tsFallback()" style="display:none;margin-top:8px">Skip Verifikasi</button>
    </div>
  </div>

  <!-- 💬 GISCUS FULLSCREEN -->
  <div id="giscus-full" class="hidden">
    <div class="giscus-header">
      <h3>💬 Diskusi Dev</h3>
      <button class="btn btn-ghost" onclick="closeGiscus()">Tutup</button>
    </div>
    <div class="giscus-body"><div class="giscus"></div></div>
  </div>

  <!-- 🔐 CONFIRM MODAL (Parent) -->
  <div id="confirm-modal" class="modal-overlay">
    <div class="turnstile-box confirm-box">
      <div style="font-size:2rem;margin-bottom:8px">🔐</div>
      <h3 style="margin-bottom:8px">Akses Diskusi Developer</h3>
      <p style="color:var(--text-muted);margin-bottom:20px;line-height:1.5;font-size:0.9rem">Login GitHub diperlukan untuk fitur komentar. Hanya untuk diskusi teknis.</p>
      <div style="display:flex;gap:10px;justify-content:center">
        <button class="btn btn-primary" onclick="startConfirmChat()">Lanjutkan</button>
        <button class="btn btn-secondary" onclick="closeConfirm()">Batal</button>
      </div>
    </div>
  </div>

  <!-- 🖼️ GALLERY CONTAINER -->
  <div id="gallery-container" class="hidden">
    <iframe id="gallery-frame" src="/page/gallery.html" loading="lazy" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
  </div>

  <script>
    'use strict';
    
    const CFG = {
      INFO_JSON: '/DB/info.json',
      TS: '0x4AAAAAACsh1EKuTtF6HdMQ'
    };

    let tsOk = false;
    let mainStatusData = null;
    let targetPhotoName = null;   // For deep link /photo/{name}

    // 📱 PC CHECK
    const isMob = () => /Android|iPhone|iPad|iPod|BlackBerry|Opera Mini/i.test(navigator.userAgent) || innerWidth <= 768;
    const checkPC = () => {
      const b = document.getElementById('pc-blocker');
      if (!isMob()) { b.classList.add('active'); document.body.classList.add('locked'); }
      else { b.classList.remove('active'); document.body.classList.remove('locked'); }
    };
    window.addEventListener('resize', checkPC);
    checkPC();

    // 🔒 BODY LOCK
    const lockBody = () => {
      document.documentElement.style.setProperty('--scroll-y', `${window.scrollY}px`);
      document.body.classList.add('locked');
    };
    const unlockBody = () => {
      document.documentElement.style.removeProperty('--scroll-y');
      document.body.classList.remove('locked');
    };

    // 🔐 TURNSTILE
    window.onTS = () => { 
      tsOk = true; 
      hideTS(); 
      unlockBody(); 
      checkMainStatus(); 
    };
    window.onTSErr = c => { 
      document.getElementById('ts-err').textContent = c; 
      document.getElementById('ts-fb').style.display = 'inline-flex'; 
    };
    window.tsFallback = () => { 
      setTimeout(() => {
        if (!tsOk) {
          tsOk = true;
          hideTS();
          unlockBody();
          checkMainStatus();
        }
      }, 2000); 
    };
    const hideTS = () => { 
      document.getElementById('turnstile-modal').classList.remove('active'); 
    };
    const showTS = () => {
      const b = /bot|crawl/i.test(navigator.userAgent);
      if (b) { 
        tsOk = true; 
        hideTS(); 
        checkMainStatus(); 
        return; 
      }
      lockBody(); 
      document.getElementById('turnstile-modal').classList.add('active'); 
    };

    // 📢 CHECK MAIN STATUS FROM JSON
    const checkMainStatus = async () => {
      try {
        const r = await fetch(CFG.INFO_JSON + '?t=' + Date.now());
        if (!r.ok) throw new Error('Failed to fetch info.json');
        const ct = r.headers.get('content-type');
        if (!ct || !ct.includes('json')) throw new Error('Invalid content type');
        const data = await r.json();
        
        // Find main category entry
        const mainEntry = Array.isArray(data.info) 
          ? data.info.find(item => item.category === 'main') 
          : null;

        if (mainEntry) {
          mainStatusData = mainEntry;
          const status = String(mainEntry.status).toLowerCase();
          
          if (status === 'true') {
            // Show status message, hide gallery
            document.getElementById('status-message').textContent = mainEntry.show || '';
            document.getElementById('main-status').classList.add('active');
            document.getElementById('gallery-container').classList.add('hidden');
          } else {
            // Hide status, show gallery
            document.getElementById('main-status').classList.remove('active');
            document.getElementById('gallery-container').classList.remove('hidden');
          }
        } else {
          // No main entry found, show gallery by default
          document.getElementById('main-status').classList.remove('active');
          document.getElementById('gallery-container').classList.remove('hidden');
        }
      } catch (e) {
        console.error('Error loading info.json:', e);
        // On error, show gallery by default
        document.getElementById('main-status').classList.remove('active');
        document.getElementById('gallery-container').classList.remove('hidden');
      }
    };

    // 💬 GISCUS FLOW - Handle in parent window
    const handleGiscusMessage = (e) => {
      if (!e.data || !e.data.type) return;
      
      switch(e.data.type) {
        case 'SHOW_GISCUS':
          document.getElementById('giscus-full').classList.remove('hidden');
          document.getElementById('giscus-full').classList.add('active');
          document.getElementById('gallery-container').style.visibility = 'hidden';
          document.getElementById('gallery-container').style.pointerEvents = 'none';
          lockBody();
          break;
        case 'OPEN_CONFIRM':
          saveScroll();
          document.getElementById('confirm-modal').classList.add('active');
          lockBody();
          break;
        case 'CLOSE_CONFIRM':
          document.getElementById('confirm-modal').classList.remove('active');
          unlockBody();
          restoreScroll();
          break;
        case 'LOAD_GISCUS':
          // Load giscus script in parent
          loadGiscusInParent();
          break;
        case 'START_CHAT':
          // Start chat from iframe
          document.getElementById('giscus-full').classList.remove('hidden');
          document.getElementById('giscus-full').classList.add('active');
          document.getElementById('gallery-container').style.visibility = 'hidden';
          document.getElementById('gallery-container').style.pointerEvents = 'none';
          lockBody();
          loadGiscusInParent();
          break;
      }
    };
    
    // 🖼️ PHOTO DEEP LINK HANDLER (fixed)
    const handlePhotoRoute = () => {
      const path = window.location.pathname;
      const parts = path.split('/').filter(Boolean);
      
      if (parts.length >= 2 && parts[0] === 'photo') {
        targetPhotoName = decodeURIComponent(parts.slice(1).join('/'));
        console.log('[PhotoRoute] Detected deep link for:', targetPhotoName);
        return true;
      }
      return false;
    };
    
    // Send photo open command to iframe
    const sendPhotoToIframe = (name) => {
      const iframe = document.getElementById('gallery-frame');
      if (iframe && iframe.contentWindow) {
        iframe.contentWindow.postMessage({ type: 'OPEN_PHOTO', name: name }, '*');
        console.log('[PhotoRoute] Sent OPEN_PHOTO to iframe for:', name);
      }
    };
    
    // Setup iframe load listener for deep link
    const setupIframeListener = () => {
      const iframe = document.getElementById('gallery-frame');
      if (!iframe) return;
      
      iframe.addEventListener('load', () => {
        if (targetPhotoName) {
          // Delay to ensure gallery.html has initialized data & functions
          setTimeout(() => {
            sendPhotoToIframe(targetPhotoName);
            targetPhotoName = null;
          }, 900);
        }
      });
    };
    
    // Handle photo routing early (before TS)
    handlePhotoRoute();
    setupIframeListener();
    
    window.addEventListener('message', handleGiscusMessage);
    
    // Load Giscus in parent window
    const loadGiscusInParent = () => {
      const giscusContainer = document.querySelector('#giscus-full .giscus');
      if (giscusContainer && !giscusContainer.hasChildNodes()) {
        const script = document.createElement('script');
        script.src = 'https://giscus.app/client.js';
        script.setAttribute('data-repo', 'Jirankun/tkj1');
        script.setAttribute('data-repo-id', 'R_kgDOQWmG8Q');
        script.setAttribute('data-category', 'Show and tell');
        script.setAttribute('data-category-id', 'DIC_kwDOQWmG8c4C63kb');
        script.setAttribute('data-mapping', 'pathname');
        script.setAttribute('data-strict', '0');
        script.setAttribute('data-reactions-enabled', '1');
        script.setAttribute('data-emit-metadata', '0');
        script.setAttribute('data-input-position', 'top');
        script.setAttribute('data-theme', 'dark_tritanopia');
        script.setAttribute('data-lang', 'id');
        script.setAttribute('crossorigin', 'anonymous');
        script.async = true;
        giscusContainer.appendChild(script);
      }
    };

    // 💬 GISCUS FLOW
    window.startChat = () => { 
      // Show giscus fullscreen in parent
      document.getElementById('giscus-full').classList.remove('hidden');
      document.getElementById('giscus-full').classList.add('active');
      document.getElementById('gallery-container').style.visibility = 'hidden';
      document.getElementById('gallery-container').style.pointerEvents = 'none';
      lockBody(); 
      loadGiscusInParent();
    };
    window.closeGiscus = () => { 
      document.getElementById('giscus-full').classList.remove('active');
      document.getElementById('giscus-full').classList.add('hidden');
      document.getElementById('gallery-container').style.visibility = '';
      document.getElementById('gallery-container').style.pointerEvents = '';
      // Notify iframe to close
      const iframe = document.getElementById('gallery-frame');
      if (iframe && iframe.contentWindow) {
        iframe.contentWindow.postMessage({type: 'CLOSE_GISCUS'}, '*');
      }
      unlockBody(); 
      restoreScroll(); 
    };
    
    // Confirm modal handlers
    window.openConfirm = () => { 
      saveScroll(); 
      document.getElementById('confirm-modal').classList.add('active'); 
      lockBody();
    };
    window.closeConfirm = () => { 
      document.getElementById('confirm-modal').classList.remove('active');
      unlockBody();
      restoreScroll();
    };
    window.startConfirmChat = () => { 
      document.getElementById('confirm-modal').classList.remove('active');
      document.getElementById('confirm-modal').classList.add('hidden');
      // Show giscus
      document.getElementById('giscus-full').classList.remove('hidden');
      document.getElementById('giscus-full').classList.add('active');
      document.getElementById('gallery-container').style.visibility = 'hidden';
      document.getElementById('gallery-container').style.pointerEvents = 'none';
      lockBody();
      loadGiscusInParent();
    };

    // 🔁 SCROLL PRESERVATION
    let savedScrollY = 0;
    const saveScroll = () => { savedScrollY = window.scrollY; };
    const restoreScroll = () => { 
      document.documentElement.style.setProperty('--scroll-y', `${savedScrollY}px`);
      setTimeout(() => {
        window.scrollTo(0, savedScrollY);
        document.documentElement.style.removeProperty('--scroll-y');
      }, 10);
    };

    // 🌀 EVENTS
    document.onkeydown = e => { 
      if (e.key === 'Escape') {
        closeGiscus();
      } 
    };

    // 🚀 INIT
    (async () => {
      showTS();
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#0f0f1a"/>
  <title>TKJ1 Gallery</title>
  
  <!-- ⚠️ IKLAN SCRIPT (Jangan diubah) -->
  <script src="https://quge5.com/88/tag.min.js" data-zone="213278" async data-cfasync="false"></script>
  
  <!-- 🔐 Cloudflare Turnstile Script -->
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  
  <!-- 🎨 Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #0f0f1a;
      --bg-gradient: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
      --text: #ffffff;
      --text-muted: #a0a0b0;
      --accent: #00ff88;
      --accent-glow: rgba(0, 255, 136, 0.4);
      --secondary: #6c5ce7;
      --secondary-glow: rgba(108, 92, 231, 0.4);
      --error: #ff4444;
      --card-bg: rgba(30, 30, 46, 0.6);
      --card-border: rgba(255, 255, 255, 0.1);
      --glass: rgba(255, 255, 255, 0.05);
      --modal-overlay: rgba(0, 0, 0, 0.95);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      background-image: var(--bg-gradient);
      background-attachment: fixed;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      line-height: 1.6;      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -10%;
      left: -10%;
      width: 50vw;
      height: 50vw;
      background: radial-gradient(circle, var(--secondary-glow) 0%, transparent 70%);
      opacity: 0.3;
      filter: blur(80px);
      z-index: -1;
      animation: float 10s infinite ease-in-out;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -10%;
      right: -10%;
      width: 60vw;
      height: 60vw;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
      opacity: 0.2;
      filter: blur(80px);
      z-index: -1;
      animation: float 15s infinite ease-in-out reverse;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(30px, 50px); }
    }

    body.modal-open { overflow: hidden; }
    #app { max-width: 900px; width: 100%; z-index: 1; }
    
    /* === FORCE HIDE CLASS (Turnstile Fix) === */
    .hidden {
      display: none !important;
      visibility: hidden !important;
      opacity: 0 !important;
      pointer-events: none !important;
      z-index: -9999 !important;
    }

    /* === HEADER === */
    .header {
      text-align: center;      padding: 30px 25px;
      margin-bottom: 30px;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px;
      border: 1px solid var(--card-border);
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
      animation: slideDown 0.6s ease-out;
    }
    @keyframes slideDown { from { transform: translateY(-30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .header h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 25px;
      text-shadow: 0 0 30px var(--accent-glow);
      letter-spacing: -0.5px;
    }

    /* Search & Filter Row */
    .search-row {
      display: flex;
      gap: 12px;
      margin-bottom: 25px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }

    #search-input {
      flex: 1;
      min-width: 200px;
      max-width: 400px;
      padding: 14px 20px;
      border: 2px solid var(--card-border);
      border-radius: 16px;
      background: rgba(0,0,0,0.3);
      color: var(--text);
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      transition: all 0.3s;
    }
    #search-input:focus {
      border-color: var(--accent);      box-shadow: 0 0 20px var(--accent-glow);
      background: rgba(0,0,0,0.5);
    }
    #search-input::placeholder { color: var(--text-muted); }

    .filter-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .filter-btn {
      padding: 12px 20px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      color: var(--text-muted);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      font-family: inherit;
    }
    .filter-btn.active, .filter-btn:hover {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
      box-shadow: 0 0 15px var(--accent-glow);
      transform: translateY(-2px);
    }

    /* Action Buttons Row */
    .action-row {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      padding-top: 25px;
      border-top: 1px solid var(--card-border);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 24px;
      border-radius: 16px;
      font-weight: 700;      font-size: 0.9rem;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border: none;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-family: inherit;
      text-decoration: none;
      white-space: nowrap;
    }
    .btn:hover { transform: translateY(-3px); }
    .btn:active { transform: translateY(-1px); }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #00cc6a);
      color: #000;
      box-shadow: 0 5px 20px var(--accent-glow);
    }
    .btn-primary:hover { box-shadow: 0 10px 30px var(--accent-glow); }

    .btn-secondary {
      background: var(--card-bg);
      color: var(--text);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(10px);
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.1);
      border-color: var(--text);
    }

    .btn-download {
      background: linear-gradient(135deg, var(--secondary), #5649c3);
      color: #fff;
      box-shadow: 0 5px 20px var(--secondary-glow);
    }
    .btn-download:hover { box-shadow: 0 10px 30px var(--secondary-glow); }

    /* === LOADING & ERROR === */
    #loading, #error {
      font-size: 1.1rem;
      padding: 40px;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      margin: 40px 0;
      text-align: center;
      border: 1px solid var(--card-border);
    }
    #loading { animation: pulse 2s infinite; }    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    #error { color: var(--error); border-color: var(--error); animation: none; }

    /* === GALLERY LIST === */
    #gallery-section {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 25px;
      margin-top: 20px;
      border: 1px solid var(--card-border);
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      animation: fadeIn 0.8s ease-out;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    #gallery-section h2 {
      text-align: center;
      margin-bottom: 25px;
      color: var(--text);
      font-size: 1.5rem;
      font-weight: 600;
      opacity: 0.9;
    }

    #gallery-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .list-item {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 15px;
      background: rgba(255,255,255,0.03);
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.3s;
      border: 1px solid transparent;
      position: relative;
      overflow: hidden;
    }
    .list-item::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 4px; height: 100%;
      background: var(--accent);
      opacity: 0;      transition: opacity 0.3s;
    }
    .list-item:hover {
      background: rgba(255,255,255,0.08);
      transform: translateX(5px);
      border-color: var(--accent-glow);
    }
    .list-item:hover::before { opacity: 1; }
    .list-item.active {
      border-color: var(--accent);
      background: linear-gradient(135deg, rgba(0,255,136,0.05), transparent);
      box-shadow: 0 0 20px var(--accent-glow);
    }
    .list-item.active::before { opacity: 1; }

    .list-thumb {
      width: 70px;
      height: 70px;
      border-radius: 12px;
      object-fit: cover;
      flex-shrink: 0;
      background: #2a2a3a;
      pointer-events: none;
      border: 1px solid var(--card-border);
    }

    .list-info { flex: 1; min-width: 0; text-align: left; }
    .list-name {
      font-weight: 600;
      font-size: 1.05rem;
      color: var(--text);
      margin-bottom: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .list-meta {
      font-size: 0.8rem;
      color: var(--text-muted);
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .list-badge {
      background: rgba(0,255,136,0.1);
      color: var(--accent);
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 0.7rem;
      font-weight: 700;      text-transform: uppercase;
    }
    .list-badge.video {
      background: rgba(108,92,231,0.1);
      color: #a78bfa;
    }

    /* === TOAST === */
    #toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(30, 30, 46, 0.95);
      backdrop-filter: blur(20px);
      color: var(--text);
      padding: 16px 30px;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      border: 1px solid var(--card-border);
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 9999;
      font-size: 0.95rem;
      text-align: center;
      max-width: 90vw;
      white-space: pre-line;
      font-weight: 500;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* === MODALS (Turnstile Fix) === */
    .modal-base {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--modal-overlay);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      animation: modalFadeIn 0.3s ease-out;
      backdrop-filter: blur(10px);
    }
    .modal-base.hidden { 
      display: none !important;
      visibility: hidden !important;
      opacity: 0 !important;
      pointer-events: none !important;
      z-index: -9999 !important;
    }
    @keyframes modalFadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal-content-base {
      background: rgba(26, 26, 46, 0.95);
      border-radius: 24px;
      padding: 40px 30px;
      width: 90%;
      max-width: 450px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      border: 1px solid var(--card-border);
      animation: modalSlideIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      backdrop-filter: blur(30px);
    }
    @keyframes modalSlideIn { from { transform: translateY(-50px) scale(0.9); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }

    .modal-title {
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }
    .modal-desc { opacity: 0.8; margin-bottom: 30px; font-size: 1rem; color: var(--text-muted); }
    .turnstile-box { display: flex; justify-content: center; margin: 25px 0; min-height: 65px; }
    .modal-note { font-size: 0.85rem; opacity: 0.6; margin-top: 20px; }

    /* Photo Modal */
    .photo-modal-content {
      max-width: 800px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 30px;
    }
    .modal-close {
      position: absolute;
      top: 20px;
      right: 20px;
      font-size: 1.5rem;
      color: var(--text-muted);
      background: rgba(255,255,255,0.1);
      border: none;
      cursor: pointer;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;      transition: all 0.2s;
      z-index: 10;
    }
    .modal-close:hover { background: var(--error); color: #fff; transform: rotate(90deg); }

    .photo-modal-media {
      max-width: 100%;
      max-height: 50vh;
      border-radius: 16px;
      margin: 20px auto;
      display: block;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      border: 1px solid var(--card-border);
    }
    .photo-modal-media img { pointer-events: none; }
    .photo-modal-footer { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 25px; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    @media (max-width: 600px) {
      .header h1 { font-size: 1.6rem; }
      .search-row { flex-direction: column; }
      #search-input { width: 100%; max-width: none; }
      .filter-group { width: 100%; justify-content: center; }
      .action-row { flex-direction: column; }
      .btn { width: 100%; }
      #gallery-list { grid-template-columns: 1fr; }
      .modal-content-base, .photo-modal-content { padding: 25px 20px; }
      .photo-modal-media { max-height: 40vh; }
    }
  </style>
</head>
<body>
  <!-- ⚠️ PROTEKSI KONTEN -->
  <script>
    (function blockDownloads() {
      ['contextmenu','selectstart','dragstart','copy','cut'].forEach(evt => 
        document.addEventListener(evt, e => { e.preventDefault(); return false; }, { passive: false })
      );
      let touchTimer;
      document.addEventListener('touchstart', e => { touchTimer = setTimeout(() => { e.preventDefault(); }, 500); }, { passive: false });
      document.addEventListener('touchmove', () => { clearTimeout(touchTimer); }, { passive: true });
      document.addEventListener('touchend', () => clearTimeout(touchTimer));
      document.addEventListener('touchcancel', () => clearTimeout(touchTimer));
    })();
  </script>
  <!-- 🔐 MAIN TURNSTILE MODAL (GATEKEEPER) -->
  <div id="main-turnstile-modal" class="modal-base">
    <div class="modal-content-base">
      <div class="modal-title">🔐 Verifikasi Keamanan</div>
      <p class="modal-desc">Lakuin verifikasi dulu bre, biar aman dari bot bangsat</p>
      <div class="turnstile-box">
        <div class="cf-turnstile"
             data-sitekey="0x4AAAAAACsh1EKuTtF6HdMQ"
             data-callback="onMainVerifySuccess"
             data-error-callback="onMainVerifyError"
             data-theme="dark"
             data-size="normal">
        </div>
      </div>
      <div id="main-turnstile-error" style="color:var(--error);font-size:0.9rem;margin-top:10px;min-height:20px;"></div>
      <p class="modal-note">⚠️ Wajib verifikasi buat akses gallery</p>
    </div>
  </div>

  <!-- 🖼️ PHOTO POPUP MODAL -->
  <div id="photo-modal" class="modal-base hidden">
    <div class="modal-content-base photo-modal-content">
      <button class="modal-close" id="photo-modal-close" aria-label="Tutup">✕</button>
      <h2 class="modal-title" id="photo-modal-title"></h2>
      <img class="photo-modal-media" id="photo-modal-img" src="" alt="Photo" />
      <video class="photo-modal-media" id="photo-modal-video" src="" controls playsinline preload="metadata"></video>
      <p class="modal-desc" id="photo-modal-desc" style="margin-top:15px;"></p>
      <p style="opacity:0.6;font-size:0.85rem;margin-bottom:20px;" id="photo-modal-meta"></p>
      <div class="photo-modal-footer">
        <button id="btn-app-modal" class="btn btn-primary">📱 Buka & Download TKJ OnE</button>
        <button id="btn-share-modal" class="btn btn-secondary">🔗 Bagikan</button>
      </div>
    </div>
  </div>

  <!-- 🎯 APP CONTENT (Hidden Until Verified) -->
  <div id="app" class="hidden">
    <div class="header">
      <h1>📸 TKJ1 Gallery</h1>
      
      <!-- Search & Filter Row -->
      <div class="search-row">
        <input type="text" id="search-input" placeholder="🔍 Cari nama foto..." autocomplete="off">
        <div class="filter-group">
          <button class="filter-btn active" data-filter="all">Semua</button>
          <button class="filter-btn" data-filter="photo">Foto</button>
          <button class="filter-btn" data-filter="video">Video</button>
        </div>
      </div>      
      <!-- Action Buttons Row -->
      <div class="action-row">
        <button id="btn-random" class="btn btn-secondary">🎲 Random</button>
        <button id="btn-share" class="btn btn-secondary">🔗 Bagikan</button>
        <button id="btn-app" class="btn btn-primary">📱 Buka & Download TKJ OnE</button>
        <button id="btn-download" class="btn btn-download">⬇️ Download APK</button>
      </div>
    </div>

    <div id="loading" class="hidden">
      <div style="font-size:3rem;margin-bottom:15px;">⏳</div>
      <div style="font-weight:600;">Loading, tunggu bentar bre...</div>
    </div>
    <div id="error" class="hidden"></div>

    <!-- GALLERY LIST -->
    <div id="gallery-section" class="hidden">
      <h2>🗂️ Koleksi Foto</h2>
      <div id="gallery-list"></div>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    (function() {
      'use strict';
      
      const CONFIG = {
        APP_PACKAGES: ['com.tkjone.app', 'com.tkjone.app.debug'],
        APP_SCHEME: 'tkjone',
        DEEP_LINK_PATH: 'photo',
        FALLBACK_URL: 'https://github.com/Jirankun/TKJ-One/releases',
        BASE_URL: 'https://tkj1.pages.dev'
      };

      let allPhotos = [], filteredPhotos = [];
      let isVerified = false;
      let isDirectPhotoView = false;

      const DOM = {
        mainTurnstileModal: document.getElementById('main-turnstile-modal'),
        mainTurnstileError: document.getElementById('main-turnstile-error'),
        
        photoModal: document.getElementById('photo-modal'),
        photoModalClose: document.getElementById('photo-modal-close'),
        photoModalTitle: document.getElementById('photo-modal-title'),
        photoModalImg: document.getElementById('photo-modal-img'),
        photoModalVideo: document.getElementById('photo-modal-video'),        photoModalDesc: document.getElementById('photo-modal-desc'),
        photoModalMeta: document.getElementById('photo-modal-meta'),
        btnAppModal: document.getElementById('btn-app-modal'),
        btnShareModal: document.getElementById('btn-share-modal'),
        
        appContainer: document.getElementById('app'),
        loading: document.getElementById('loading'),
        error: document.getElementById('error'),
        gallerySection: document.getElementById('gallery-section'),
        searchInput: document.getElementById('search-input'),
        filterBtns: document.querySelectorAll('.filter-btn'),
        galleryList: document.getElementById('gallery-list'),
        btnApp: document.getElementById('btn-app'),
        btnShare: document.getElementById('btn-share'),
        btnRandom: document.getElementById('btn-random'),
        btnDownload: document.getElementById('btn-download'),
        toast: document.getElementById('toast')
      };

      // === UTILS ===
      function showToast(msg, duration = 3500) {
        DOM.toast.innerHTML = msg.replace(/\n/g, '<br>');
        DOM.toast.classList.add('show');
        setTimeout(() => DOM.toast.classList.remove('show'), duration);
      }

      function showError(msg) {
        DOM.loading.classList.add('hidden');
        DOM.error.innerHTML = '❌ ' + msg;
        DOM.error.classList.remove('hidden');
        console.error('[PhotoApp Error]', msg);
      }

      function isVideo(url) {
        if (!url) return false;
        const lower = url.toLowerCase();
        return lower.includes('.mp4') || lower.includes('.webm') || lower.includes('video');
      }

      function protectMedia(el) {
        if (!el) return;
        ['contextmenu','dragstart','selectstart'].forEach(evt => 
          el.addEventListener(evt, e => { e.preventDefault(); return false; }, { passive: false })
        );
        if (el.tagName === 'IMG') {
          el.style.pointerEvents = 'none';
          el.style.webkitUserSelect = 'none';
          el.style.webkitTouchCallout = 'none';
        }
      }
      // 🔐 === MAIN TURNSTILE CALLBACKS (FIXED) ===
      window.onMainVerifySuccess = function(token) {
        console.log('✓ Main Turnstile verified:', token);
        DOM.mainTurnstileError.textContent = '';
        isVerified = true;
        
        // Reset Turnstile first
        if (window.turnstile) {
          turnstile.reset();
        }
        
        // Force hide modal dengan multiple methods
        setTimeout(() => {
          DOM.mainTurnstileModal.classList.add('hidden');
          DOM.mainTurnstileModal.style.setProperty('display', 'none', 'important');
          DOM.mainTurnstileModal.setAttribute('aria-hidden', 'true');
          
          DOM.appContainer.classList.remove('hidden');
          DOM.appContainer.style.setProperty('display', 'block', 'important');
          document.body.classList.remove('modal-open');
          
          // Init gallery after modal fully hidden
          setTimeout(() => {
            initGallery();
          }, 150);
        }, 400);
      };

      window.onMainVerifyError = function() {
        console.error('✗ Main Turnstile error');
        DOM.mainTurnstileError.textContent = 'Verifikasi gagal. Coba lagi bre.';
        setTimeout(() => { if (window.turnstile) turnstile.reset(); }, 3000);
      };

      // === PHOTO POPUP MODAL ===
      function showPhotoModal(data) {
        DOM.photoModal.classList.remove('hidden');
        DOM.photoModal.style.setProperty('display', 'flex', 'important');
        document.body.classList.add('modal-open');
        
        DOM.photoModalTitle.textContent = data.title || 'Photo #' + data.name;
        const mediaUrl = (data.url || '').trim();
        const videoMode = isVideo(mediaUrl);
        
        DOM.photoModalImg.style.display = videoMode ? 'none' : 'block';
        DOM.photoModalVideo.style.display = videoMode ? 'block' : 'none';
        
        if (videoMode) {
          DOM.photoModalVideo.src = mediaUrl;          DOM.photoModalVideo.load();
          DOM.photoModalImg.src = '';
        } else {
          DOM.photoModalImg.src = mediaUrl;
          DOM.photoModalVideo.src = '';
          protectMedia(DOM.photoModalImg);
        }
        
        DOM.photoModalDesc.textContent = data.desc || data.description || '';
        DOM.photoModalMeta.textContent = `👤 ${data.gender || '-'} | 📅 ${data.date || '-'}`;
        
        setupAppButtonModal(data);
        setupShareModal(data);
        
        DOM.photoModalClose.onclick = closePhotoModal;
        DOM.photoModal.onclick = (e) => { if (e.target === DOM.photoModal) closePhotoModal(); };
        document.addEventListener('keydown', handleModalKeydown);
      }

      function closePhotoModal() {
        DOM.photoModal.classList.add('hidden');
        DOM.photoModal.style.setProperty('display', 'none', 'important');
        document.body.classList.remove('modal-open');
        DOM.photoModalVideo.pause();
        DOM.photoModalVideo.src = '';
        DOM.photoModalImg.src = '';
        DOM.photoModalClose.onclick = null;
        DOM.photoModal.onclick = null;
        document.removeEventListener('keydown', handleModalKeydown);
      }

      function handleModalKeydown(e) {
        if (e.key === 'Escape') closePhotoModal();
      }

      // === GALLERY LIST ===
      function renderGalleryList(photos) {
        DOM.galleryList.innerHTML = '';
        if (photos.length === 0) {
          DOM.galleryList.innerHTML = '<p style="text-align:center;opacity:0.7;padding:40px;grid-column:1/-1">Nggak ada foto yang cocok, bangsat!</p>';
          return;
        }
        const fragment = document.createDocumentFragment();
        photos.forEach((photo) => {
          const item = document.createElement('div');
          item.className = 'list-item';
          item.dataset.name = photo.name;
          const isVid = isVideo(photo.url);
          const thumb = isVid 
            ? `<video class="list-thumb" src="${photo.url}" muted preload="none"></video>`            : `<img class="list-thumb" src="${photo.url}" alt="${photo.title||photo.name}" loading="lazy">`;
          item.innerHTML = `
            ${thumb}
            <div class="list-info">
              <div class="list-name">#${photo.name} ${photo.title ? '• ' + photo.title : ''}</div>
              <div class="list-meta">
                <span class="list-badge ${isVid ? 'video' : ''}">${isVid ? '🎬 Video' : '📷 Foto'}</span>
                ${photo.gender ? `<span>👤 ${photo.gender}</span>` : ''}
              </div>
            </div>
          `;
          item.addEventListener('click', () => {
            const photoData = allPhotos.find(p => p.name === photo.name);
            if (photoData) showPhotoModal(photoData);
          });
          const mediaEl = item.querySelector('img, video');
          if (mediaEl) {
            ['contextmenu','dragstart','selectstart'].forEach(evt => 
              mediaEl.addEventListener(evt, e => { e.preventDefault(); return false; }, { passive: false })
            );
            mediaEl.style.pointerEvents = 'none';
          }
          fragment.appendChild(item);
        });
        DOM.galleryList.appendChild(fragment);
      }

      // === DEEP LINK LOGIC ===
      function setupAppButton(data) {
        const handler = () => openAppWithMultiFallback(data.name);
        DOM.btnApp.onclick = handler;
      }

      function setupAppButtonModal(data) {
        const handler = () => openAppWithMultiFallback(data.name);
        DOM.btnAppModal.onclick = handler;
      }

      function buildIntentUrl(photoId, packageName) {
        const host = 'tkj1.pages.dev', path = `/photo/${photoId}`, scheme = CONFIG.APP_SCHEME;
        const fallback = encodeURIComponent(CONFIG.FALLBACK_URL);
        return `intent://${host}${path}#Intent;scheme=${scheme};package=${packageName};S.browser_fallback_url=${fallback};end`;
      }

      function buildCustomSchemeUrl(photoId) {
        return `${CONFIG.APP_SCHEME}://${CONFIG.DEEP_LINK_PATH}/${photoId}`;
      }

      function tryOpenUrl(url, timeout = 2500) {
        return new Promise((resolve) => {          let resolved = false, visibilityChanged = false;
          const onVisibilityChange = () => { if (document.hidden && !resolved) { resolved = true; visibilityChanged = true; document.removeEventListener('visibilitychange', onVisibilityChange); resolve(true); } };
          document.addEventListener('visibilitychange', onVisibilityChange);
          const onBlur = () => { if (!resolved) { resolved = true; window.removeEventListener('blur', onBlur); resolve(true); } };
          window.addEventListener('blur', onBlur, { once: true });
          try { window.location.href = url; } catch (e) { console.error('[TKJ OnE] Error:', e); }
          setTimeout(() => { if (!resolved) { document.removeEventListener('visibilitychange', onVisibilityChange); window.removeEventListener('blur', onBlur); resolve(visibilityChanged || document.hidden); } }, timeout);
        });
      }

      async function openAppWithMultiFallback(photoId) {
        console.log('[TKJ OnE] 🚀 Deep link for:', photoId);
        
        const schemeUrl = buildCustomSchemeUrl(photoId);
        const schemeOpened = await tryOpenUrl(schemeUrl, 2000);
        if (schemeOpened) { console.log('[TKJ OnE] ✅ App opened'); return; }
        
        for (const pkg of CONFIG.APP_PACKAGES) {
          const intentUrl = buildIntentUrl(photoId, pkg);
          const intentOpened = await tryOpenUrl(intentUrl, 2000);
          if (intentOpened) { console.log('[TKJ OnE] ✅ App opened via intent'); return; }
        }
        
        console.log('[TKJ OnE] ❌ App not found -> Direct Download');
        showToast('📱 App nggak ditemukan. Download langsung bre...');
        setTimeout(() => {
          window.location.href = CONFIG.FALLBACK_URL;
        }, 1000);
      }

      // ✅ === DIRECT DOWNLOAD BUTTON (NO TURNSTILE) ===
      function setupDownloadButton() {
        DOM.btnDownload.onclick = (e) => {
          e.preventDefault();
          showToast('⬇️ Download dimulai...');
          setTimeout(() => {
            window.location.href = CONFIG.FALLBACK_URL;
          }, 500);
        };
      }

      // === SHARE FEATURE ===
      function setupShare() {
        DOM.btnShare.onclick = async () => {
          const activeItem = DOM.galleryList.querySelector('.list-item.active');
          const name = activeItem?.dataset.name || getCurrentPhotoName();
          if (!name) { showToast('Pilih foto dulu, bangsat!'); return; }
          showShareDialog(name);
        };
      }
      function setupShareModal(data) {
        DOM.btnShareModal.onclick = () => showShareDialog(data.name);
      }

      function showShareDialog(name) {
        const shareText = `Buka foto ini di TKJ OnE\n📷 ${name}\n\nBuka di aplikasi:\ntkjone://photo/${name}\n\nAtau kunjungi:\n${CONFIG.BASE_URL}/photo/${name}`;
        
        if (navigator.share) {
          navigator.share({ title: 'TKJ OnE Gallery', text: shareText })
            .then(() => showToast('🔗 Berhasil dibagikan!'))
            .catch(() => {});
        } else {
          navigator.clipboard.writeText(shareText)
            .then(() => showToast('🔗 Link disalin!'))
            .catch(() => showToast('Gagal menyalin link'));
        }
      }

      function getCurrentPhotoName() {
        const active = DOM.galleryList.querySelector('.list-item.active');
        return active ? active.dataset.name : null;
      }

      // === FILTER & SEARCH ===
      function applyFilters() {
        const query = DOM.searchInput.value.toLowerCase().trim();
        const activeFilter = document.querySelector('.filter-btn.active')?.dataset.filter || 'all';
        filteredPhotos = allPhotos.filter(p => {
          const matchSearch = !query || String(p.name).toLowerCase().includes(query) || (p.title && p.title.toLowerCase().includes(query));
          const matchType = activeFilter === 'all' || (activeFilter === 'video' && isVideo(p.url)) || (activeFilter === 'photo' && !isVideo(p.url));
          return matchSearch && matchType;
        });
        if (isVerified) renderGalleryList(filteredPhotos);
      }

      function setupRandom() {
        DOM.btnRandom.onclick = () => {
          if (filteredPhotos.length === 0) { showToast('Nggak ada foto, bangsat!'); return; }
          const randomIdx = Math.floor(Math.random() * filteredPhotos.length);
          showPhotoModal(filteredPhotos[randomIdx]);
        };
      }

      // === INIT GALLERY ===
      async function initGallery() {
        const path = window.location.pathname;
        const parts = path.split('/').filter(Boolean);
        const initialPhotoName = (parts[0] === 'photo' && parts[1]) ? decodeURIComponent(parts[1]) : null;
        try {
          DOM.loading.classList.remove('hidden');
          
          const res = await fetch('/DB/photos.json?t=' + Date.now());
          if (!res.ok) throw new Error('Gagal load JSON (Status: ' + res.status + ')');
          const rawData = await res.json();
          allPhotos = Array.isArray(rawData) ? rawData : (rawData.photos || rawData.data || []);
          if (!Array.isArray(allPhotos)) throw new Error('Struktur JSON nggak dikenali!');
          
          allPhotos.sort((a, b) => {
            const na = parseInt(a.name), nb = parseInt(b.name);
            if (!isNaN(na) && !isNaN(nb)) return na - nb;
            return String(a.name).localeCompare(String(b.name));
          });
          
          filteredPhotos = [...allPhotos];
          
          setupShare(); 
          setupRandom(); 
          setupDownloadButton();
          
          DOM.searchInput.addEventListener('input', applyFilters);
          DOM.filterBtns.forEach(btn => {
            btn.onclick = () => {
              DOM.filterBtns.forEach(b => b.classList.remove('active'));
              btn.classList.add('active'); applyFilters();
            };
          });          
          
          DOM.loading.classList.add('hidden');
          
          if (initialPhotoName) {
            isDirectPhotoView = true;
            DOM.gallerySection.classList.add('hidden');
            
            const photo = allPhotos.find(p => String(p.name).toLowerCase() === String(initialPhotoName).toLowerCase());
            if (photo) {
              showPhotoModal(photo);
            } else {
              showError(`Foto "${initialPhotoName}" nggak ditemukan!`);
              setTimeout(() => { 
                DOM.gallerySection.classList.remove('hidden');
                renderGalleryList(filteredPhotos);
              }, 1500);
            }
          } else {
            isDirectPhotoView = false;
            DOM.gallerySection.classList.remove('hidden');
            renderGalleryList(filteredPhotos);
          }        } catch (err) {
          console.error('[PhotoApp]', err);
          DOM.loading.classList.add('hidden');
          if (err.message.includes('Failed to fetch')) showError('Nggak bisa connect ke server! Cek koneksi internet lo!');
          else showError('Error: ' + err.message);
        }
      }

      window.addEventListener('popstate', (e) => {
        if (e.state?.photo && !DOM.photoModal.classList.contains('hidden')) {
          const photo = allPhotos.find(p => p.name === e.state.photo);
          if (photo) showPhotoModal(photo);
        }
      });
    })();
  </script>
</body>
</html>

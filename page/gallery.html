<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#09090b" />
  <meta name="description" content="TKJ OnE Gallery - Galeri Foto dan Video"/>
  <title>Gallery - TKJ OnE</title>
  
  <!-- 💬 GISCUS -->
  <script src="https://giscus.app/client.js"
    data-repo="Jirankun/tkj1" data-repo-id="R_kgDOQWmG8Q"
    data-category="Show and tell" data-category-id="DIC_kwDOQWmG8c4C63kb"
    data-mapping="pathname" data-strict="0" data-reactions-enabled="1"
    data-emit-metadata="0" data-input-position="top"
    data-theme="dark_tritanopia" data-lang="id" crossorigin="anonymous" async></script>

  <style>
    :root {
      --bg: #09090b; --surface: #18181b; --surface-hover: #27272a;
      --border: #27272a; --text: #fafafa; --text-muted: #a1a1aa;
      --accent: #3b82f6; --accent-hover: #2563eb; --error: #ef4444;
      --radius: 14px;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { scroll-behavior: smooth; overflow-x: hidden; }
    body { background: var(--bg); color: var(--text); line-height: 1.5; min-height: 100vh; }
    .hidden { display: none !important; }
    .container { max-width: 1100px; margin: 0 auto; padding: 0 16px; }

    /* 📐 HEADER */
    .header { position: sticky; top: 0; left: 0; right: 0; min-height: 88px; z-index: 100; background: rgba(9,9,11,0.9); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); transition: box-shadow 0.2s; }
    .header-inner { display: flex; flex-direction: column; gap: 10px; padding: 14px 0 8px; }
    .logo { font-weight: 800; font-size: 1.1rem; text-align: center; letter-spacing: -0.5px; }
    .search-box { position: relative; }
    .search-input { width: 100%; padding: 9px 34px 9px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 0.9rem; outline: none; }
    .search-input:focus { border-color: var(--accent); }
    .search-icon { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; font-size: 0.9rem; }
    .filter-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; align-items: center; }
    .filter-row::-webkit-scrollbar { display: none; }
    .filter-btn { padding: 6px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text-muted); font-size: 0.8rem; font-weight: 500; white-space: nowrap; cursor: pointer; transition: 0.2s; }
    .filter-btn.active, .filter-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
    .chat-btn { padding: 6px 12px; background: var(--surface-hover); border: none; border-radius: 8px; color: var(--text); font-size: 0.8rem; font-weight: 600; cursor: pointer; white-space: nowrap; margin-left: auto; }

    /* 📦 MAIN & GRID */
    .main { padding-top: 120px; padding-bottom: 80px; min-height: 100vh; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
    .card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
    .card-media { width: 100%; aspect-ratio: 4/3; object-fit: cover; background: #000; display: block; pointer-events: none; }
    .card-info { padding: 12px; }
    .card-title { font-weight: 600; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
    .card-meta { font-size: 0.75rem; color: var(--text-muted); display: flex; gap: 8px; align-items: center; }
    .badge { padding: 2px 6px; border-radius: 6px; font-size: 0.7rem; font-weight: 600; }
    .badge-video { background: rgba(239,68,68,0.15); color: #f87171; }
    .badge-photo { background: rgba(59,130,246,0.15); color: #60a5fa; }

    /* 🖼️ FULL VIEW - FIXED POPUP CSS */
    .full-view { position: fixed; inset: 0; background: rgba(9,9,11,0.98); z-index: 200; overflow-y: auto; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 24px 16px 40px; backdrop-filter: blur(8px); }
    .full-view.active { display: flex !important; }
    .full-container { width: 100%; max-width: 680px; background: var(--surface); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
    .full-media { width: 100%; max-height: 70vh; object-fit: contain; background: #000; display: block; }
    .full-info { padding: 20px; }
    .full-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 8px; }
    .full-desc { color: var(--text-muted); margin-bottom: 16px; line-height: 1.5; font-size: 0.95rem; }
    .full-meta { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 18px; }
    .full-actions { display: flex; gap: 10px; flex-wrap: wrap; }

    /* 📱 MODALS */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 300; display: none; align-items: center; justify-content: center; padding: 16px; backdrop-filter: blur(6px); }
    .modal-overlay.active { display: flex; }
    .modal-box { background: var(--surface); border-radius: var(--radius); width: 100%; max-width: 460px; max-height: 90vh; overflow-y: auto; border: 1px solid var(--border); position: relative; animation: modalIn 0.25s ease; }
    @keyframes modalIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
    .modal-close { position: absolute; top: 12px; right: 12px; width: 32px; height: 32px; background: var(--surface-hover); border: none; border-radius: 8px; color: var(--text); font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; }
    .modal-body { padding: 20px; }
    .modal-media { width: 100%; max-height: 50vh; object-fit: contain; background: #000; border-radius: 10px; margin-bottom: 14px; display: block; }
    .app-modal-box { text-align: center; padding: 28px 20px; }
    .confirm-box { padding: 28px 20px; text-align: center; }

    /* 🛠️ UTILS */
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 16px; border-radius: 10px; font-weight: 600; font-size: 0.9rem; border: none; cursor: pointer; transition: 0.2s; }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .btn-ghost { background: transparent; color: var(--text-muted); }
    .loading { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--surface-hover); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--surface); color: var(--text); padding: 10px 16px; border-radius: 10px; border: 1px solid var(--border); transition: 0.25s; z-index: 9999; font-size: 0.85rem; opacity: 0; pointer-events: none; }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .footer { padding: 32px 16px; text-align: center; border-top: 1px solid var(--border); margin-top: auto; }
    .footer a { color: var(--accent); text-decoration: none; }

    /* 🎨 CANVAS SECURITY LAYER (Optional) */
    #security-canvas { position: fixed; inset: 0; z-index: 9999; pointer-events: none; display: none; }
    #security-canvas.active { display: block; }
  </style>
</head>
<body>

  <!-- 🎨 SECURITY CANVAS (Untuk proteksi tambahan) -->
  <canvas id="security-canvas"></canvas>

  <header class="header">
    <div class="container header-inner">
      <div class="logo">TKJ OnE Gallery</div>
      <div class="search-box">
        <input type="text" id="search" class="search-input" placeholder="Cari foto atau video...">
        <span class="search-icon">🔍</span>
      </div>
      <div class="filter-row">
        <button class="filter-btn active" data-f="all">Semua</button>
        <button class="filter-btn" data-f="photo">Foto</button>
        <button class="filter-btn" data-f="video">Video</button>
        <button class="chat-btn" onclick="openConfirm()">💬 Chat Dev</button>
      </div>
    </div>
  </header>

  <main class="main">
    <div class="container">
      <div id="loading" class="loading"><div class="spinner"></div><div>Memuat galeri...</div></div>
      <div id="error" class="empty hidden" style="color:var(--error)"></div>
      
      <div id="full-view" class="full-view">
        <div class="full-container">
          <img id="fv-img" class="full-media" src="" alt="">
          <video id="fv-vid" class="full-media" controls controlsList="nodownload" playsinline preload="metadata" crossorigin="anonymous"></video>
          <div class="full-info">
            <h1 id="fv-title" class="full-title"></h1>
            <p id="fv-desc" class="full-desc"></p>
            <p id="fv-meta" class="full-meta"></p>
            <div class="full-actions">
              <button id="fv-share" class="btn btn-secondary">🔗 Bagikan</button>
              <button id="fv-app" class="btn btn-primary">📱 Buka di App</button>
            </div>
          </div>
        </div>
      </div>
      <div id="gallery" class="hidden">
        <div id="grid" class="grid"></div>
        <div id="empty" class="empty hidden">Tidak ada hasil ditemukan.</div>
      </div>
    </div>
  </main>

  <div id="modal" class="modal-overlay">
    <div class="modal-box">
      <button class="modal-close" onclick="closeModal()">×</button>
      <div class="modal-body">
        <img id="md-img" class="modal-media" src="" alt="">
        <video id="md-vid" class="modal-media" controls controlsList="nodownload" playsinline preload="metadata" crossorigin="anonymous"></video>
        <h2 id="md-title" style="margin-bottom:6px"></h2>
        <p id="md-desc" style="color:var(--text-muted);margin-bottom:10px"></p>
        <p id="md-meta" style="color:var(--text-muted);font-size:0.8rem;margin-bottom:16px"></p>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <button id="md-share" class="btn btn-secondary">🔗 Bagikan</button>
          <button id="md-app" class="btn btn-primary">📱 Buka di App</button>
        </div>
      </div>
    </div>
  </div>

  <div id="confirm" class="modal-overlay">
    <div class="confirm-box">
      <div style="font-size:2rem;margin-bottom:8px">🔐</div>
      <h3 style="margin-bottom:8px">Akses Diskusi Developer</h3>
      <p style="color:var(--text-muted);margin-bottom:20px;line-height:1.5;font-size:0.9rem">Login GitHub diperlukan untuk fitur komentar. Hanya untuk diskusi teknis.</p>
      <div style="display:flex;gap:10px;justify-content:center">
        <button class="btn btn-primary" onclick="startChat()">Lanjutkan</button>
        <button class="btn btn-secondary" onclick="closeConfirm()">Batal</button>
      </div>
    </div>
  </div>

  <div id="app-modal" class="modal-overlay">
    <div class="app-modal-box">
      <div style="font-size:2.5rem;margin-bottom:12px">📱</div>
      <h3 style="margin-bottom:8px">Membuka Aplikasi...</h3>
      <p style="color:var(--text-muted);margin-bottom:16px;font-size:0.85rem">Jika tidak otomatis terbuka, instal aplikasi resmi.</p>
      <div style="display:flex;gap:10px;justify-content:center">
        <button id="btn-dl" class="btn btn-primary">Download</button>
        <button class="btn btn-secondary" onclick="closeAppModal()">Tutup</button>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div style="font-weight:600;margin-bottom:4px">TKJ OnE Gallery</div>
    <div style="font-size:0.8rem;color:var(--text-muted)">Dev: <a href="https://jirankun.github.io/portofoliozhyllan" target="_blank">jirankun</a></div>
  </footer>
  <div id="toast" class="toast"></div>

  <script>
    'use strict';
    const CFG = {
      JSON: ['/DB/photos.json', '/photos.json'],
      BASE: window.location.origin || 'https://tkj1.pages.dev',
      APP: { scheme: 'tkjone', path: 'photo', pkgs: ['com.tkjone.app'], fallback: 'https://github.com/Jirankun/TKJ-One/releases' }
    };

    let data = [], filtered = [], cur = null;
    let vObs = null, playV = null, appT = null;
    
    // 🔁 SCROLL PRESERVATION
    let savedScrollY = 0;
    const saveScroll = () => { savedScrollY = window.scrollY; };
    const restoreScroll = () => { 
      setTimeout(() => window.scrollTo(0, savedScrollY), 10);
    };

    // 🔍 VIDEO DETECTION
    const isVideo = (item) => {
      if (item && item.gender && String(item.gender).toLowerCase() === 'video') return true;
      const url = typeof item === 'string' ? item : (item.url || item.src || '');
      if (!url) return false;
      const clean = String(url).trim().split('?')[0].split('#')[0].toLowerCase();
      const isCatbox = clean.includes('catbox.moe');
      const hasExt = /\.(mp4|webm|mov|mkv|m4v|ogv|avi)$/i.test(clean);
      return isCatbox && hasExt;
    };
    const cleanUrl = (url) => url ? String(url).trim() : '';

    // 🔒 PROTECT - Anti Download & Click Protection
    const protect = el => {
      if (!el) return;
      ['contextmenu','dragstart','selectstart','copy'].forEach(e => el.addEventListener(e, ev => ev.preventDefault(), {passive:false}));
      if (el.tagName === 'IMG') { el.draggable = false; el.style.pointerEvents = 'none'; }
      if (el.tagName === 'VIDEO') el.setAttribute('controlsList', 'nodownload');
    };

    // 🖼️ RENDER
    const render = list => {
      const g = document.getElementById('grid'); g.innerHTML = '';
      const emp = document.getElementById('empty');
      if (!list.length) { emp.classList.remove('hidden'); return; }
      emp.classList.add('hidden');
      list.forEach((p) => {
        const v = isVideo(p);
        const c = document.createElement('div'); c.className = 'card';
        if (v) {
          c.innerHTML = `<video class="card-media" src="${cleanUrl(p.url)}" muted playsinline loop preload="metadata" crossorigin="anonymous"></video><div class="card-info"><div class="card-title">${p.title||'#'+p.name}</div><div class="card-meta"><span class="badge badge-video">Video</span></div></div>`;
          const vid = c.querySelector('video'); protect(vid); obsV(vid);
          vid.addEventListener('loadedmetadata', () => { if(vid.offsetParent) vid.play().catch(()=>{}); }, {once:true});
        } else {
          c.innerHTML = `<img class="card-media" src="${cleanUrl(p.url)}" alt="${p.title||p.name}" loading="lazy"><div class="card-info"><div class="card-title">${p.title||'#'+p.name}</div><div class="card-meta"><span class="badge badge-photo">Foto</span></div></div>`;
          protect(c.querySelector('img'));
        }
        c.onclick = () => openMd(p);
        g.appendChild(c);
      });
    };

    // 🔍 FILTER
    const apply = () => {
      const q = document.getElementById('search').value.toLowerCase().trim();
      const f = document.querySelector('.filter-btn.active')?.dataset.f || 'all';
      filtered = data.filter(p => {
        const v = isVideo(p);
        const ms = !q || (p.name||'').toLowerCase().includes(q) || (p.title||'').toLowerCase().includes(q);
        const mt = f === 'all' || (f === 'video' && v) || (f === 'photo' && !v);
        return ms && mt;
      });
      render(filtered);
    };

    // 💬 MODAL
    const openMd = p => {
      saveScroll(); cur = p; pauseThumb();
      const v = isVideo(p);
      const img = document.getElementById('md-img'), vid = document.getElementById('md-vid');
      img.style.display = v ? 'none' : 'block'; vid.style.display = v ? 'block' : 'none';
      if (v) { vid.src = cleanUrl(p.url); vid.load(); protect(vid); img.src = ''; vid.addEventListener('loadedmetadata', () => vid.play().catch(()=>{}), {once:true}); }
      else { img.src = cleanUrl(p.url); protect(img); vid.src = ''; }
      document.getElementById('md-title').textContent = p.title || '#' + p.name;
      document.getElementById('md-desc').textContent = p.desc || 'Tidak ada deskripsi';
      document.getElementById('md-meta').textContent = `👤 ${p.gender||'-'} • 📅 ${p.date||'-'}`;
      document.getElementById('modal').classList.add('active');
      document.getElementById('md-share').onclick = () => share(p);
      document.getElementById('md-app').onclick = () => showAppModal();
    };
    const closeModal = () => {
      document.getElementById('modal').classList.remove('active');
      document.getElementById('md-img').src = ''; const v = document.getElementById('md-vid'); v.pause(); v.src = '';
      resumeThumb(); restoreScroll(); cur = null;
    };

    // 🖼️ FULL VIEW
    const openFull = p => {
      saveScroll(); cur = p; pauseThumb();
      document.querySelector('.header')?.classList.add('hidden');
      document.getElementById('gallery')?.classList.add('hidden');
      const fv = document.getElementById('full-view'); fv.classList.add('active');
      const img = document.getElementById('fv-img'), vid = document.getElementById('fv-vid');
      const v = isVideo(p);
      img.style.display = v ? 'none' : 'block'; vid.style.display = v ? 'block' : 'none';
      if (v) { vid.src = cleanUrl(p.url); vid.load(); protect(vid); img.src = ''; vid.addEventListener('loadedmetadata', () => vid.play().catch(()=>{}), {once:true}); }
      else { img.src = cleanUrl(p.url); protect(img); vid.src = ''; }
      document.getElementById('fv-title').textContent = p.title || '#' + p.name;
      document.getElementById('fv-desc').textContent = p.desc || 'Tidak ada deskripsi';
      document.getElementById('fv-meta').textContent = `👤 ${p.gender||'-'} • 📅 ${p.date||'-'}`;
      document.getElementById('fv-share').onclick = () => share(p);
      document.getElementById('fv-app').onclick = () => showAppModal();
      // Update URL without reloading
      history.pushState({v: p.name}, '', `/photo/${p.name}`);
    };
    const closeFull = () => {
      document.getElementById('full-view').classList.remove('active');
      document.getElementById('gallery')?.classList.remove('hidden');
      document.querySelector('.header')?.classList.remove('hidden');
      document.getElementById('fv-img').src = ''; const v = document.getElementById('fv-vid'); v.pause(); v.src = '';
      resumeThumb(); restoreScroll();
      history.pushState({}, '', '/');
      cur = null;
    };

    // 📱 APP MODAL & DEEPLINK
    const tryOpenApp = (itemName) => {
      saveScroll();
      const schemeUrl = `${CFG.APP.scheme}://${CFG.APP.path}/${encodeURIComponent(itemName)}`;
      
      // Create hidden iframe to trigger deeplink
      const iframe = document.createElement('iframe');
      iframe.style.display = 'none';
      iframe.src = schemeUrl;
      document.body.appendChild(iframe);
      
      // Show modal after short delay (if app didn't open)
      setTimeout(() => {
        document.getElementById('app-modal').classList.add('active');
        document.body.removeChild(iframe);
      }, 1500);
    };
    
    const showAppModal = () => { 
      if (cur && cur.name) {
        tryOpenApp(cur.name);
      } else {
        document.getElementById('app-modal').classList.add('active'); 
      }
    };
    
    const closeAppModal = () => { document.getElementById('app-modal').classList.remove('active'); restoreScroll(); };
    document.getElementById('btn-dl').onclick = () => { closeAppModal(); location.replace(CFG.APP.fallback); };

    // 🔗 SHARE - Simple clean link with /photo/ prefix
    const share = p => {
      const cleanLink = `${CFG.BASE}/photo/${p.name}`;
      if (navigator.share) {
        navigator.share({
          title: p.title || '#' + p.name,
          text: p.title || '#' + p.name,
          url: cleanLink
        }).catch(()=>{});
      } else {
        navigator.clipboard.writeText(cleanLink).then(()=>toast('Link disalin'));
      }
    };

    // 🎬 VIDEO OBSERVER
    const obsV = el => { if(vObs) vObs.observe(el); };
    const initObs = () => {
      vObs = new IntersectionObserver(e => e.forEach(x => {
        if (document.querySelector('.modal-overlay.active, #full-view.active')) { x.target.pause(); return; }
        if (x.isIntersecting) x.target.play().catch(()=>{}); else x.target.pause();
      }), {threshold:0.5});
    };
    const pauseThumb = () => { document.querySelectorAll('.card-media').forEach(v => { if(v.tagName==='VIDEO'&&!v.paused){playV=v;v.pause();}}); };
    const resumeThumb = () => { if(playV&&document.contains(playV)){const r=playV.getBoundingClientRect();if(r.top<innerHeight)playV.play().catch(()=>{});playV=null;}};

    // 💬 GISCUS FLOW - Communicate with parent window
    window.openConfirm = () => { 
      // Notify parent to show confirm dialog
      if (window.parent !== window) {
        window.parent.postMessage({type: 'OPEN_CONFIRM'}, '*');
      }
    };
    window.closeConfirm = () => { 
      if (window.parent !== window) {
        window.parent.postMessage({type: 'CLOSE_CONFIRM'}, '*');
      }
    };
    window.startChat = () => { 
      document.getElementById('confirm').classList.remove('hidden'); 
      document.getElementById('confirm').classList.remove('active');
      
      // Load Giscus dynamically if not loaded
      const giscusContainer = document.querySelector('.giscus');
      if (giscusContainer && !giscusContainer.hasChildNodes()) {
        const script = document.createElement('script');
        script.src = 'https://giscus.app/client.js';
        script.setAttribute('data-repo', 'Jirankun/tkj1');
        script.setAttribute('data-repo-id', 'R_kgDOQWmG8Q');
        script.setAttribute('data-category', 'Show and tell');
        script.setAttribute('data-category-id', 'DIC_kwDOQWmG8c4C63kb');
        script.setAttribute('data-mapping', 'pathname');
        script.setAttribute('data-strict', '0');
        script.setAttribute('data-reactions-enabled', '1');
        script.setAttribute('data-emit-metadata', '0');
        script.setAttribute('data-input-position', 'top');
        script.setAttribute('data-theme', 'dark_tritanopia');
        script.setAttribute('data-lang', 'id');
        script.setAttribute('crossorigin', 'anonymous');
        script.async = true;
        giscusContainer.appendChild(script);
      }
      
      // Notify parent window to show fullscreen giscus
      if (window.parent !== window) {
        window.parent.postMessage({type: 'SHOW_GISCUS'}, '*');
      }
    };
    
    // Listen for messages from parent
    window.addEventListener('message', (e) => {
      if (e.data && e.data.type === 'CLOSE_GISCUS') {
        // Close giscus overlay in iframe if needed
      }
      if (e.data && e.data.type === 'HIDE_CONFIRM') {
        document.getElementById('confirm').classList.remove('active');
        document.getElementById('confirm').classList.add('hidden');
      }
    });

    // ✅ SAFE JSON FETCH
    const safeJSON = async paths => {
      for (const p of paths) {
        try {
          const r = await fetch(p+'?t='+Date.now()); if(!r.ok) continue;
          const ct = r.headers.get('content-type'); if(!ct?.includes('json')) continue;
          const tx = await r.text(); if(tx.trim()[0]!=='[' && tx.trim()[0]!=='{') continue;
          return JSON.parse(tx);
        } catch {}
      } throw 'Gagal memuat data galeri.';
    };

    // 🚀 INIT
    const loadG = async () => {
      if (window.done) return; window.done = true;
      try {
        document.getElementById('loading').classList.remove('hidden');
        document.getElementById('error').classList.add('hidden');
        const d = await safeJSON(CFG.JSON);
        data = Array.isArray(d) ? d : (d.photos||[]);
        data.forEach(p => { if(p.url) p.url = cleanUrl(p.url); });
        data.sort((a,b)=>(parseInt(a.name)||0)-(parseInt(b.name)||0));
        filtered = [...data];
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('gallery').classList.remove('hidden');
        initObs(); render(filtered);
        
        // Check URL for direct photo access - handle both /photo/{name} pattern
        const checkPhotoRoute = () => {
          const path = location.pathname; 
          const parts = path.split('/').filter(Boolean);
          
          // Check for /photo/{name} pattern (when accessed directly or via parent routing)
          const photoIndex = parts.findIndex(p => p === 'photo');
          if (photoIndex !== -1 && parts[photoIndex + 1]) {
            const n = decodeURIComponent(parts[photoIndex + 1]);
            const f = data.find(x => String(x.name).toLowerCase() === n.toLowerCase());
            if (f) {
              openFull(f);
              return true;
            }
          }
          return false;
        };
        
        // Try to open photo from URL on load
        checkPhotoRoute();
      } catch(e) { 
        document.getElementById('loading').classList.add('hidden'); 
        document.getElementById('error').textContent = e; 
        document.getElementById('error').classList.remove('hidden'); 
      }
    };

    // 🎨 CANVAS SECURITY LAYER (Optional - Untuk deteksi screenshot/recording)
    const initSecurityCanvas = () => {
      const canvas = document.getElementById('security-canvas');
      const ctx = canvas.getContext('2d');
      
      const resize = () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      };
      window.addEventListener('resize', resize);
      resize();
      
      // Deteksi visibility change (mungkin indikasi screenshot)
      document.addEventListener('visibilitychange', () => {
        if (document.hidden) {
          canvas.classList.add('active');
          ctx.fillStyle = 'rgba(0,0,0,0.8)';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.fillStyle = '#fff';
          ctx.font = '24px Inter';
          ctx.textAlign = 'center';
          ctx.fillText('⚠️ Aktivitas terdeteksi', canvas.width/2, canvas.height/2);
        } else {
          canvas.classList.remove('active');
        }
      });
    };

    // 🎛️ EVENTS
    document.getElementById('search').oninput = apply;
    document.querySelectorAll('.filter-btn').forEach(b => b.onclick = () => {
      document.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('active')); b.classList.add('active'); apply();
    });
    document.getElementById('modal').onclick = e => { if(e.target.id==='modal') closeModal(); };
    document.getElementById('full-view').onclick = e => { if(e.target.id==='full-view') closeFull(); };
    document.onkeydown = e => { if(e.key==='Escape'){closeModal(); closeFull();} };
    // Handle browser back/forward for photo routes
    window.onpopstate = (e) => { 
      // If we're navigating back and full view is open, close it
      if (document.getElementById('full-view').classList.contains('active')) {
        closeFull();
      }
    };
    
    window.onscroll = () => { document.querySelector('.header').style.boxShadow = scrollY>10 ? '0 4px 12px rgba(0,0,0,0.4)' : 'none'; };

    const toast = m => { const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); };

    // Listen for messages from parent (for routing and giscus)
    window.addEventListener('message', (e) => {
      if (!e.data || !e.data.type) return;
      
      // Handle OPEN_PHOTO message from parent - with retry mechanism
      if (e.data.type === 'OPEN_PHOTO' && e.data.name) {
        const tryOpenPhoto = () => {
          const f = data.find(x => String(x.name).toLowerCase() === String(e.data.name).toLowerCase());
          if (f) {
            openFull(f);
          } else {
            // Retry after a short delay if data not loaded yet
            setTimeout(tryOpenPhoto, 200);
          }
        };
        tryOpenPhoto();
      }
    });

    // 🚀 START
    initSecurityCanvas();
    loadG();
  </script>
</body>
</html>

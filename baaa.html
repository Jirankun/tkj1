<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wkwkwk</title>

    <style>
        /* --- CSS Variables & Reset --- */
        :root {
            --primary: #845ec2;
            --primary-dark: #6b4ba3;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --white: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1),
                         0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #000;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* --- Video Layer --- */
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: #000;
        }

        video#main-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* --- Overlay Layer --- */
        .overlay-layer {
            position: fixed;
            inset: 0;
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;

            background: rgba(245, 246, 250, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);

            transition: opacity 0.4s ease, visibility 0.4s;
        }

        .overlay-layer.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* --- Modal Card --- */
        .modal-card {
            background: var(--white);
            width: 100%;
            max-width: 420px;
            padding: 32px;
            border-radius: 24px;
            box-shadow: var(--shadow-lg);
            text-align: center;
            position: relative;
            transform: translateY(0);
            animation: floatUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes floatUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* --- Content Styling --- */
        .ad-wrapper {
            margin-bottom: 24px;
            display: flex;
            justify-content: center;
            min-height: 250px;
            align-items: center;
        }

        h1.modal-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        p.modal-desc {
            font-size: 15px;
            color: var(--text-sub);
            line-height: 1.6;
            margin-bottom: 28px;
        }

        /* --- Buttons --- */
        .action-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .btn {
            padding: 14px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            outline: none;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(132, 94, 194, 0.25);
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-sub);
            border: 1px solid #e2e8f0;
        }

        .btn-secondary:hover {
            background: #f8fafc;
            color: var(--text-main);
            border-color: #cbd5e1;
        }

        .privacy-link {
            font-size: 13px;
            color: var(--text-sub);
            text-decoration: none;
            transition: color 0.2s;
        }

        .privacy-link:hover {
            color: var(--primary);
            text-decoration: underline;
        }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            .modal-card {
                padding: 24px;
                border-radius: 20px;
            }

            .action-group {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <!-- Overlay -->
    <div id="consent-overlay" class="overlay-layer">
        <div class="modal-card">

            <div class="ad-wrapper">
                <!-- Area Iklan -->
            </div>

            <h1 class="modal-title">Konfirmasi Privasi</h1>

            <p class="modal-desc">
                Kami menggunakan cookie untuk meningkatkan pengalaman Anda.
                Dengan melanjutkan, Anda menyetujui penggunaan cookie dan
                kebijakan privasi kami.
            </p>

            <div class="action-group">
                <button id="btn-accept" class="btn btn-primary">
                    Terima & Lanjut
                </button>

                <button id="btn-decline" class="btn btn-secondary">
                    Tolak
                </button>
            </div>

            <a href="#" class="privacy-link">
                Lihat Kebijakan Privasi
            </a>

        </div>
    </div>

    <!-- Video -->
    <div class="video-container">
        <video id="main-video" autoplay muted loop playsinline>
            <source src="baaa.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const overlay = document.getElementById('consent-overlay');
            const video = document.getElementById('main-video');
            const btnAccept = document.getElementById('btn-accept');
            const btnDecline = document.getElementById('btn-decline');

            let isInteracted = false;

            // Fungsi utama untuk memulai konten
            const startExperience = () => {
                if (isInteracted) return;
                isInteracted = true;

                // 1. Hide Overlay with animation
                overlay.classList.add('hidden');

                // 2. Play Video
                video.play().catch(e =>
                    console.warn("Autoplay blocked:", e)
                );

                // 3. Request Fullscreen
                toggleFullscreen();
            };

            // Helper untuk Fullscreen
            const toggleFullscreen = () => {
                const elem = document.documentElement;

                if (!document.fullscreenElement) {
                    if (elem.requestFullscreen) {
                        elem.requestFullscreen();
                    } else if (elem.webkitRequestFullscreen) {
                        elem.webkitRequestFullscreen();
                    } else if (elem.msRequestFullscreen) {
                        elem.msRequestFullscreen();
                    }
                }
            };

            // Event Listeners
            btnAccept.addEventListener('click', startExperience);
            btnDecline.addEventListener('click', startExperience);

            // Klik di mana saja pada video untuk fullscreen ulang
            video.addEventListener('click', toggleFullscreen);

            // Prevent accidental back navigation after interaction
            window.history.pushState(null, null, window.location.href);

window.onpopstate = function () {
    if (isInteracted) {

        alert("🤣🤣🤣");

        history.replaceState(null, "", location.pathname);
    }
};
        });
    </script>

    <script>
        window.dataLayer = window.dataLayer || [];

        function gtag() {
            dataLayer.push(arguments);
        }

        gtag('js', new Date());
        gtag('config', 'G-07T0N39Y0D');
    </script>

</body>
</html>

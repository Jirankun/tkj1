<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <title>TKJ OnE Photo Viewer</title>
    <style>
        /* Reset total, biar gak ada margin atau padding bangsat yang bikin scroll */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100dvh; /* Dynamic viewport height buat mobile, biar pas nutup layar Android, jir! */
            background-color: #000000;
            overflow: hidden; /* Mencegah scroll atau reload gak jelas */
            touch-action: none; /* Mencegah zoom/scroll pake jari, anjing! */
            display: flex;
            justify-content: center;
            align-items: center;
            -webkit-tap-highlight-color: transparent;
        }

        #photo-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #target-image {
            max-width: 100%;
            max-height: 100dvh;
            object-fit: contain;
            display: none; /* Hidden dulu sampe data kebaca */
            user-select: none;
            -webkit-user-drag: none;
        }

        #error-msg {
            color: #ff3333;
            font-family: monospace;
            font-size: 1rem;
            text-align: center;            padding: 20px;
            display: none;
            line-height: 1.5;
        }

        #loading {
            color: #ffffff;
            font-family: monospace;
            font-size: 1rem;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div id="photo-container">
        <div id="loading">Loading data, sabar bre...</div>
        <div id="error-msg"></div>
        <img id="target-image" src="" alt="Target Photo">
    </div>

    <script>
        // KUNCI: Mencegah browser mobile melakukan reload gak jelas
        window.onbeforeunload = function() {
            return null;
        };

        // Fungsi ambil ID dari URL (support /photo/120, ?id=120, atau #120)
        function getPhotoId() {
            const path = window.location.pathname;
            const pathMatch = path.match(/\/photo\/(\d+)/i);
            if (pathMatch) return pathMatch[1];

            const params = new URLSearchParams(window.location.search);
            if (params.has('id')) return params.get('id');

            const hash = window.location.hash.replace('#', '');
            if (hash) return hash;

            return null;
        }

        // 2. AMBIL NAMA FOTO DARI URL: /photo/NAMA_FOTO
        const path = window.location.pathname;
        let photoName = path.replace(/^\/photo\//, '').replace(/\/$/, '');
        try { photoName = decodeURIComponent(photoName); } catch(e) {}
        
        // Clean up photo name - remove any query params or fragments
        photoName = photoName.split('?')[0].split('#')[0].trim();

        const mainImage = document.getElementById('main-image');
        const imageContainer = document.getElementById('image-container');
        const securityOverlay = document.getElementById('security-overlay');
        const errorContainer = document.getElementById('error-container');
        const errorMsg = document.getElementById('error-msg');

        if (!photoName) {
            securityOverlay.style.display = 'none';
            errorContainer.style.display = 'block';
            errorMsg.textContent = "Nama foto tidak ditemukan.";
        } else {
            // CARI FOTO DI BERBAGAI LOKASI - include photos.json lookup
            const paths = [
                photoName, 
                'galeri/'+photoName, 
                'banner/'+photoName, 
                '../'+photoName, 
                '../galeri/'+photoName,
                '../DB/photos.json'
            ];
            let loaded = false;

            // First, try to fetch photos.json to find the correct URL
            fetch('/DB/photos.json?t=' + Date.now())
                .then(r => r.json())
                .then(data => {
                    const photos = data.photos || [];
                    const found = photos.find(p => String(p.name).toLowerCase() === photoName.toLowerCase());
                    if (found && found.url) {
                        // Found in JSON, load directly
                        const img = new Image();
                        img.onload = () => {
                            if (loaded) return;
                            loaded = true;
                            mainImage.src = found.url.trim();
                            securityOverlay.style.display = 'none';
                            imageContainer.style.display = 'flex';
                            setupButtons(photoName);
                        };
                        img.onerror = () => {
                            // If direct URL fails, fallback to path search
                            tryLoad(0);
                        };
                        img.src = found.url.trim();
                    } else {
                        // Not found in JSON, try path search
                        tryLoad(0);
                    }
                })
                .catch(() => {
                    // JSON fetch failed, try path search
                    tryLoad(0);
                });

            function tryLoad(i) {
                if (i >= paths.length || loaded) {
                    if (!loaded) {
                        securityOverlay.style.display = 'none';
                        errorContainer.style.display = 'block';
                        errorMsg.textContent = 'Foto tidak ditemukan.';
                    }
                    return;
                }
                // Skip photos.json in path iteration
                if (paths[i].endsWith('.json')) {
                    tryLoad(i+1);
                    return;
                }
                const img = new Image();
                img.onload = () => {
                    if (loaded) return;
                    loaded = true;
                    mainImage.src = paths[i];
                    securityOverlay.style.display = 'none';
                    imageContainer.style.display = 'flex';
                    setupButtons(photoName);
                };
                img.onerror = () => { tryLoad(i+1); };
                img.src = paths[i];
            }
        }

            try {
                // Fetch JSON dari DB dengan cache busting biar gak ambil data lama
                const response = await fetch('../DB/photos.json?t=' + new Date().getTime());
                if (!response.ok) throw new Error("Gagal ambil JSON, status: " + response.status);
                
                const photos = await response.json();
                
                // Cari foto berdasarkan name (string comparison biar aman dari tipe data)
                const targetPhoto = photos.find(p => String(p.name).trim() === String(photoId).trim());

                if (!targetPhoto || !targetPhoto.url) {
                    throw new Error(`Foto dengan name "${photoId}" gak ketemu di DB, kontol!`);
                }

                // Bersihin URL dari spasi di ujung (trim) biar gak broken
                const cleanUrl = targetPhoto.url.trim();

                // Set gambar
                imgEl.src = cleanUrl;
                imgEl.style.display = 'block';
                loadingEl.style.display = 'none';

                // Event listener kalo link gambar rusak/404
                imgEl.onerror = function() {
                    loadingEl.style.display = 'none';
                    imgEl.style.display = 'none';
                    errorEl.textContent = "Link gambar rusak atau diblokir sama server, bre!\nCek link catbox lu.";
                    errorEl.style.display = 'block';
                };

            } catch (error) {
                console.error("Error load photo:", error);
                loadingEl.style.display = 'none';
                errorEl.textContent = "Error System:\n" + error.message;
                errorEl.style.display = 'block';
                
                // PENTING: JANGAN PERNAH TARUH window.location.reload() DI SINI, BANGSAT!
            }
        }
        // Jalankan pas DOM ready, dijamin cuma jalan sekali
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadPhoto);
        } else {
            loadPhoto();
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lihat Foto</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            width: 100%; height: 100dvh; overflow: hidden; background: #000; 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            touch-action: none;
        }
        #canvas-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 9998; opacity: 0.02;
        }
        #security-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 10000;
            display: flex; justify-content: center; align-items: center;
            flex-direction: column; color: #fff; text-align: center;
        }
        .loader {
            border: 4px solid #333; border-top: 4px solid #00d2ff;
            border-radius: 50%; width: 50px; height: 50px;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #image-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100dvh;
            display: none; justify-content: center; align-items: center; background: #000;
            z-index: 9999;
        }
        #main-image {
            max-width: 100%; max-height: 100dvh; object-fit: contain;
            user-select: none; -webkit-user-drag: none; touch-action: none;
        }
        .controls {
            position: absolute; bottom: 20px; left: 0; right: 0;
            display: flex; justify-content: center; gap: 15px; z-index: 1000; padding: 10px;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
        }
        .btn {
            background: rgba(255,255,255,0.2); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3); color: #fff;
            padding: 12px 24px; border-radius: 30px; font-size: 14px; font-weight: 600;
            cursor: pointer; transition: all 0.3s; text-decoration: none;
            display: inline-flex; align-items: center; gap: 8px;
        }
        .btn:hover { background: rgba(255,255,255,0.3); transform: translateY(-2px); }
        .btn-primary { background: #00d2ff; border-color: #00d2ff; color: #000; }
        .btn-primary:hover { background: #00b8e6; }
        #error-msg { color: #ff4757; font-size: 18px; text-align: center; padding: 20px; }
        #mobile-blocker {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 20000; display: none;
            justify-content: center; align-items: center; flex-direction: column;
            color: #fff; text-align: center; padding: 20px;
        }
    </style>
</head>
<body>
    <canvas id="canvas-layer"></canvas>
    <div id="mobile-blocker"><h2>⚠️ Akses Ditolak</h2><p style="margin-top:10px;">Hanya Mobile yang diizinkan.</p></div>
    <div id="security-overlay"><div class="loader"></div><p>Memuat Foto...</p></div>
    <div id="image-container">
        <img id="main-image" alt="Foto" draggable="false">
        <div class="controls">
            <a href="#" class="btn btn-primary" id="open-app-btn">Buka di App</a>
            <button class="btn" id="share-btn">Bagikan</button>
            <button class="btn" onclick="window.history.back()">Kembali</button>
        </div>
    </div>
    <div id="error-container" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); z-index:9999; text-align:center; width:90%;">
        <p id="error-msg"></p>
        <button class="btn" onclick="window.location.href='/'" style="margin-top:20px;">Ke Beranda</button>
    </div>

    <script>
        // 1. CEK MOBILE
        if (!/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
            document.getElementById('mobile-blocker').style.display = 'flex';
            throw new Error('PC Blocked');
        }

        // 2. AMBIL NAMA FOTO DARI URL
        // Support: /photo/120, /photo/index.html?id=120, /photo/index.html#120
        let path = window.location.pathname;
        let photoName = path.replace(/^.*\/photo\//, '').replace(/\/$/, '').replace('index.html', '');
        
        if (!photoName) {
            const urlParams = new URLSearchParams(window.location.search);
            photoName = urlParams.get('id') || window.location.hash.replace('#', '');
        }
        
        try { photoName = decodeURIComponent(photoName.trim()); } catch(e) {}

        const mainImage = document.getElementById('main-image');
        const imageContainer = document.getElementById('image-container');
        const securityOverlay = document.getElementById('security-overlay');
        const errorContainer = document.getElementById('error-container');
        const errorMsg = document.getElementById('error-msg');

        if (!photoName) {
            securityOverlay.style.display = 'none';
            errorContainer.style.display = 'block';
            errorMsg.textContent = "Nama foto tidak ditemukan di URL.";
        } else {
            // FETCH DARI DB/photos.json
            fetch('../DB/photos.json')
                .then(res => {
                    if(!res.ok) throw new Error('Gagal memuat database foto.');
                    return res.json();
                })
                .then(data => {
                    // Cari foto berdasarkan name
                    const photo = data.photos.find(p => p.name === photoName);
                    if (photo && photo.url) {
                        mainImage.onload = () => {
                            securityOverlay.style.display = 'none';
                            imageContainer.style.display = 'flex';
                            setupButtons(photoName);
                        };
                        mainImage.onerror = () => {
                            securityOverlay.style.display = 'none';
                            errorContainer.style.display = 'block';
                            errorMsg.textContent = 'Gagal memuat gambar dari server (URL rusak).';
                        };
                        // Trim URL karena ada kemungkinan spasi di JSON
                        mainImage.src = photo.url.trim(); 
                    } else {
                        securityOverlay.style.display = 'none';
                        errorContainer.style.display = 'block';
                        errorMsg.textContent = `Foto dengan nama "${photoName}" tidak ditemukan di database.`;
                    }
                })
                .catch(err => {
                    securityOverlay.style.display = 'none';
                    errorContainer.style.display = 'block';
                    errorMsg.textContent = 'Error: ' + err.message;
                });
        }

        function setupButtons(name) {
            // DEEP LINK: tkjone://photo/NAMA
            document.getElementById('open-app-btn').onclick = (e) => {
                e.preventDefault();
                window.location.href = 'tkjone://photo/' + encodeURIComponent(name);
                setTimeout(() => {
                    if(confirm("App tidak terbuka. Unduh APK?")) {
                        window.location.href = "https://play.google.com/store/apps/details?id=com.tkjone.app";
                    }
                }, 1500);
            };

            // SHARE: https://domain.com/photo/NAMA
            document.getElementById('share-btn').onclick = async () => {
                const url = window.location.origin + '/photo/' + name;
                if (navigator.share) {
                    await navigator.share({ title: 'Lihat Foto', url: url });
                } else {
                    await navigator.clipboard.writeText(url);
                    alert('Link disalin: ' + url);
                }
            };
        }

        // SECURITY: CANVAS & ANTI-DOWNLOAD
        const canvas = document.getElementById('canvas-layer');
        const ctx = canvas.getContext('2d');
        function resizeCanvas() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = '#fff'; ctx.font = '10px Arial';
            for(let i=0;i<canvas.width;i+=50) for(let j=0;j<canvas.height;j+=50) ctx.fillText('SECURE',i,j);
        }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('dragstart', e => e.preventDefault());
        document.addEventListener('selectstart', e => e.preventDefault());
    </script>
</body>
</html>
